<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Teacher Control Panel</title>

<style>

*{

box-sizing:border-box;

font-family:Arial,sans-serif;

}

body{

margin:0;

background:#e5e7eb;

}


/* HEADER */

.header{

background:#2563eb;

color:white;

padding:18px;

text-align:center;

font-size:30px;

font-weight:bold;

box-shadow:
0 2px 8px rgba(0,0,0,.2);

}


/* MAIN */

.container{

padding:20px;

}


/* TOP CARDS */

.top{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin-bottom:20px;

}

.card{

background:white;

padding:20px;

border-radius:18px;

text-align:center;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

.label{

font-size:18px;

color:#6b7280;

margin-bottom:10px;

}

.value{

font-size:34px;

font-weight:bold;

word-break:break-word;

}


/* WORD AREA */

.word-card{

background:white;

padding:30px;

border-radius:18px;

text-align:center;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

margin-bottom:20px;

}

.word{

font-size:58px;

font-weight:bold;

color:#2563eb;

margin-top:20px;

min-height:90px;

word-break:break-word;

}


/* TIMER */

.timer{

font-size:90px;

font-weight:bold;

color:#dc2626;

}


/* STATUS */

.status-box{

background:white;

padding:20px;

border-radius:18px;

text-align:center;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

margin-bottom:20px;

}

.status{

font-size:28px;

font-weight:bold;

color:#16a34a;

}


/* BUTTONS */

.buttons{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:15px;

margin-top:20px;

}

button{

border:none;

padding:18px;

font-size:18px;

font-weight:bold;

border-radius:12px;

cursor:pointer;

transition:.3s;

color:white;

}


button:hover{

transform:scale(1.03);

}


/* DISABLED */

button:disabled{

background:#9ca3af !important;

cursor:not-allowed;

transform:none;

opacity:.7;

}


/* COLORS */

.start{

background:#16a34a;

}

.stop{

background:#f59e0b;

}

.next{

background:#2563eb;

}

.skipstudent{

background:#9333ea;

}

.reset{

background:#6b7280;

}

.danger{

background:#dc2626;

}

.full{

grid-column:
span 2;

}


/* MOBILE */

@media(max-width:700px){

.word{

font-size:40px;

}

.timer{

font-size:70px;

}

.value{

font-size:28px;

}

button{

font-size:16px;

padding:16px;

}

}

</style>

</head>

<body>

<div class="header">

Teacher Control Panel

</div>


<div class="container">


<!-- TOP INFO -->

<div class="top">


<div class="card">

<div class="label">

Participant

</div>

<div
class="value"
id="studentName">

Loading...

</div>

</div>



<div class="card">

<div class="label">

Round

</div>

<div
class="value"
id="round">

1/3

</div>

</div>



<div class="card">

<div class="label">

Round Score

</div>

<div
class="value"
id="roundScore">

0

</div>

</div>



<div class="card">

<div class="label">

Total Score

</div>

<div
class="value"
id="totalScore">

0

</div>

</div>



<div class="card">

<div class="label">

Timer

</div>

<div
class="value timer"
id="timer">

0

</div>

</div>


</div>


<!-- WORD -->

<div class="word-card">

<div class="label">

Word To Spell

</div>

<div
class="word"
id="word">

Ready

</div>

</div>


<!-- STATUS -->

<div class="status-box">

<div class="label">

Competition Status

</div>

<div
class="status"
id="competitionStatus">

Waiting To Start

</div>

</div>


<!-- BUTTONS -->

<div class="buttons">


<button
class="start"
onclick="startWord()">

START WORD

</button>



<button
class="stop"
onclick="pauseTimer()">

STOP TIMER

</button>



<button
class="next"
onclick="finalizeVotes()">

FINALIZE RESULT

</button>



<button
class="next"
onclick="nextWord()">

NEXT WORD

</button>



<button
class="skipstudent"
onclick="nextStudent()">

NEXT PARTICIPANT

</button>



<button
class="reset"
onclick="resetParticipant()">

RESET PARTICIPANT

</button>



<button
class="reset"
onclick="resetRound()">

RESET ROUND

</button>



<button
class="danger full"
onclick="resetCompetition()">

RESET COMPETITION

</button>


</div>


</div>

<script src="js/teacher.js"></script>

</body>

  </html>
