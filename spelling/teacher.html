<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Teacher Control</title>

<style>

*{

box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

margin:0;
background:#e5e7eb;

}

.header{

background:#2563eb;
color:white;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;

}

.container{

padding:20px;

}

.top{

display:grid;
grid-template-columns:
repeat(4,1fr);

gap:15px;

margin-bottom:20px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

text-align:center;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

.label{

font-size:18px;
color:#555;

}

.value{

font-size:32px;
font-weight:bold;

margin-top:10px;

}

.word{

font-size:55px;
font-weight:bold;

color:#2563eb;

padding:30px;

min-height:130px;

}

.timer{

font-size:80px;
font-weight:bold;
color:red;

}

.buttons{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:15px;

margin-top:20px;

}

button{

border:none;

padding:18px;

font-size:18px;

font-weight:bold;

border-radius:10px;

cursor:pointer;

color:white;

}


.start{
background:#16a34a;
}

.stop{
background:#f59e0b;
}

.correct{
background:#22c55e;
}

.wrong{
background:#dc2626;
}

.notspelt{
background:#7c2d12;
}

.next{
background:#3b82f6;
}

.skip{
background:#9333ea;
}

.reset{
background:#6b7280;
}

.full{

grid-column:
span 3;

}

</style>

</head>

<body>

<div class="header">

Teacher Control Panel

</div>

<div class="container">

<div class="top">

<div class="card">

<div class="label">

Participant

</div>

<div
class="value"
id="studentName">

Loading...

</div>

</div>


<div class="card">

<div class="label">

Round

</div>

<div
class="value"
id="round">

1/3

</div>

</div>

<div class="card">

<div class="label">
Round Score
</div>

<div
class="value"
id="roundScore">

0

</div>

</div>


<div class="card">

<div class="label">
Total Score
</div>

<div
class="value"
id="totalScore">

0

</div>

</div>


<div class="card">

<div class="label">

Timer

</div>

<div
class="value timer"
id="timer">

0

</div>

</div>

</div>



<div class="card">

<div class="label">

Word To Spell

</div>

<div
class="word"
id="word">

Ready

</div>

</div>



<div class="buttons">

<button
class="start"
onclick="startWord()">

START

</button>


<button
class="stop"
onclick="pauseTimer()">

STOP

</button>


<button
class="correct"
onclick="correct()">

✓ CORRECT

</button>


<button
class="wrong"
onclick="wrong()">

✗ WRONG

</button>


<button
class="notspelt"
onclick="skip()">

NOT SPELT

</button>


<button
class="next"
onclick="nextWord()">

NEXT WORD

</button>


<button
class="skip"
onclick="nextStudent()">

SKIP STUDENT

</button>


<button
class="reset"
onclick="resetParticipant()">

RESET PARTICIPANT

</button>


<button
class="reset"
onclick="resetRound()">

RESET ROUND

</button>


<button
class="reset full"
onclick="resetCompetition()">

RESET COMPETITION

</button>

</div>

</div>


<script src="js/teacher.js"></script>

</body>

  </html>
