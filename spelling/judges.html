<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Manage Judges</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#f3f4f6;

}

.header{

background:#1e40af;
color:white;

padding:20px;

font-size:28px;

font-weight:bold;

text-align:center;

}

.container{

max-width:1100px;

margin:auto;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

box-shadow:
0 4px 10px rgba(0,0,0,.1);

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

button{

padding:10px 16px;

border:none;

border-radius:8px;

font-weight:bold;

cursor:pointer;

color:white;

transition:.3s;

}

button:hover{

transform:scale(1.03);

}

.add{

background:#16a34a;

}

.edit{

background:#2563eb;

margin-right:5px;

}

.delete{

background:#dc2626;

}

.home{

background:#6b7280;

margin-top:15px;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#2563eb;

color:white;

padding:15px;

}

td{

padding:15px;

border-bottom:
1px solid #ddd;

text-align:center;

}

tr:hover{

background:#f9fafb;

}


/* Modal */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(0,0,0,.5);

display:none;

justify-content:center;

align-items:center;

z-index:999;

}

.modal-content{

background:white;

padding:25px;

width:500px;

border-radius:15px;

}

.modal-header{

font-size:22px;

font-weight:bold;

margin-bottom:20px;

color:#1e40af;

}

.close{

float:right;

font-size:28px;

cursor:pointer;

color:red;

}

.input-group{

display:flex;

flex-direction:column;

margin-bottom:15px;

}

label{

margin-bottom:5px;

font-weight:bold;

}

input{

padding:12px;

border:
1px solid #ddd;

border-radius:8px;

}

.save{

background:#16a34a;

width:100%;

}

</style>

</head>

<body>

<div class="header">

Judge Management

</div>

<div class="container">

<div class="card">

<div class="topbar">

<h2>

Registered Judges

</h2>

<button
class="add"
onclick="openAddModal()">

+ Add Judge

</button>

</div>


<table>

<thead>

<tr>

<th>Name</th>

<th>Username</th>

<th>Action</th>

</tr>

</thead>

<tbody
id="judgeList">

<tr>

<td colspan="3">

Loading...

</td>

</tr>

</tbody>

</table>


<button
class="home"
onclick="goHome()">

⬅ Back Home

</button>

</div>

</div>


<!-- Modal -->

<div
class="modal"
id="judgeModal">

<div class="modal-content">

<div class="modal-header">

<span
id="modalTitle">

Add Judge

</span>

<span
class="close"
onclick="closeModal()">

×

</span>

</div>


<input
type="hidden"
id="judgeId">


<div class="input-group">

<label>

Judge Name

</label>

<input
id="fullName">

</div>


<div class="input-group">

<label>

Username

</label>

<input
id="username">

</div>


<div class="input-group">

<label>

Password

</label>

<input
type="password"
id="password">

</div>


<button
class="save"
onclick="saveJudge()">

Save Judge

</button>

</div>

</div>


<script src="js/judges.js"></script>

</body>

</html>
