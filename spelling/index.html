<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{

font-family:Arial;
background:#f3f4f6;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.box{

background:white;
padding:30px;
border-radius:10px;
width:320px;

box-shadow:0 2px 10px rgba(0,0,0,.1);

}

input{

width:100%;
padding:12px;
margin-top:10px;

}

button{

width:100%;
padding:12px;
margin-top:15px;

background:#2563eb;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="box">

<h2>System Login</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">

LOGIN

</button>

</div>

<script>
  async function login(){

let username =
document.getElementById(
"username"
).value;

let password =
document.getElementById(
"password"
).value;

const res =
await fetch(
"/.netlify/functions/spellingLogin",
{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

username,
password

})

}

);

const data =
await res.json();

if(!data.success){

alert("Invalid credentials");

return;

}

localStorage.setItem(
"user",
JSON.stringify(data.user)
);

if(data.user.role==="teacher"){

window.location=
"teacher-home.html";

}
else if(
data.user.role==="judge"
){

window.location=
"judge-home.html";

}

   }
</script>

</body>

</html>
