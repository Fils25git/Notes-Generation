<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Spelling System</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.students{background:#22c55e;}
.groups{background:#a855f7;}
.comp{background:#3b82f6;}
.leader{background:#f59e0b;}
.cert{background:#ef4444;}

</style>

</head>

<body>

<div class="header">

<h1>Spelling Competition System</h1>

<p>Teacher Dashboard</p>

</div>


<div class="container">

<div class="grid">


<div class="card">

<h2>Students</h2>

<button class="students"
onclick="go('student-registration.html')">

Open

</button>

</div>



<div class="card">

<h2>Word Groups</h2>

<button class="groups"
onclick="go('word-groups.html')">

Open

</button>

</div>

<div class="card">

<h2>Students Draw</h2>

<button class="groups"
onclick="go('draw.html')">

Open

</button>

</div>

<div class="card">

<h2>Competition</h2>

<button class="comp"
onclick="go('teacher.html')">

Open

</button>

</div>



<div class="card">

<h2>Leaderboard</h2>

<button class="leader"
onclick="go('leaderboard.html')">

Open

</button>

</div>



<div class="card">

<h2>Certificates</h2>

<button class="cert"
onclick="go('certificates.html')">

Open

</button>

</div>


</div>

</div>


<script src="js/home.js"></script>

</body>

  </html>
