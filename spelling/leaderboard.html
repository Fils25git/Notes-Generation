<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Leaderboard</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#f59e0b;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

.top1{background:#ffd700;}
.top2{background:#c0c0c0;}
.top3{background:#cd7f32;}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
}

</style>

</head>

<body>

<div class="header">

<h2>Leaderboard</h2>

</div>


<div class="container">

<table>

<thead>

<tr>

<th>Position</th>
<th>Name</th>
<th>Class</th>
<th>Score</th>

</tr>

</thead>

<tbody id="list"></tbody>

</table>


<button onclick="load()">Refresh</button>

</div>


<script src="js/leaderboard.js"></script>

</body>

</html>
