<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Spelling Competition</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:800px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

.card{

padding:15px;
margin:10px 0;
border-radius:8px;
background:#f5f5f5;

}

#timer{

font-size:45px;
font-weight:bold;
color:red;
text-align:center;

}

button{

padding:12px;
margin:5px;
cursor:pointer;
border:none;
border-radius:5px;
font-size:16px;

}

.start{
background:green;
color:white;
}

.correct{
background:blue;
color:white;
}

.wrong{
background:red;
color:white;
}

.pause{
background:orange;
color:white;
}
.register{

background:purple;
color:white;

  }
</style>

</head>

<body>

<div class="container">

<h1>Spelling Competition</h1>

<div class="card">

<h2>

Student:
<span id="studentName">
Loading...
</span>

</h2>

<h3>

Round:
<span id="round">
1
</span>

</h3>

<h3>

Word:
<span id="wordDisplay">
Ready
</span>

</h3>

</div>


<div id="timer">
0
</div>


<div align="center">

<button
class="start"
onclick="startWord()">

Start

</button>


<button
class="correct"
onclick="correctAnswer()">

✓ Correct

</button>


<button
class="wrong"
onclick="wrongAnswer()">

✗ Wrong

</button>
  <button
onclick="skipWord()">

Next Word

  </button>


<button
class="pause"
onclick="pauseTimer()">

Pause

</button>


<button
class="register"
onclick="window.location.href='student-registration.html'">

Register Students

</button>

  </div>


<div class="card">

<h3>

Score:

<span id="score">
0
</span>/9

</h3>

</div>

</div>


<script src="js/app.js"></script>

</body>

  </html>
