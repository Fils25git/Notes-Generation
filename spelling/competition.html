<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Spelling Competition</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
}

.header{
background:#2563eb;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.info{
display:flex;
justify-content:space-around;
margin-bottom:15px;
flex-wrap:wrap;
}

.info div{
padding:10px;
font-weight:bold;
}

#word{

font-size:35px;
margin:20px;
min-height:50px;

}

#timer{

font-size:60px;
font-weight:bold;
color:red;
margin:20px;

}

.buttons{

margin-top:20px;

}

button{

padding:12px 16px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:15px;

}

.start{
background:green;
}

.correct{
background:#16a34a;
}

.wrong{
background:#dc2626;
}

.skip{
background:#f59e0b;
}

.status{

margin-top:15px;
padding:10px;
background:#f5f5f5;
border-radius:6px;

}

</style>

</head>

<body>

<div class="header">

<h2>Spelling Competition</h2>

</div>


<div class="container">

<div class="card">


<div class="info">

<div>

Student:
<span id="studentName">
Loading...
</span>

</div>


<div>

Round:
<span id="round">
1
</span>/3

</div>


<div>

Score:
<span id="score">
0
</span>

</div>

</div>


<h1 id="word">

Ready

</h1>


<div id="timer">

0

</div>


<div class="buttons">

<button
class="start"
onclick="startWord()">

Start

</button>


<button
class="correct"
onclick="correct()">

✓ Correct

</button>


<button
class="wrong"
onclick="wrong()">

✗ Wrong

</button>


<button
class="skip"
onclick="skip()">

Next Word

</button>

</div>


<div class="status">

Words per round:
3

</div>

</div>

</div>

<script src="js/competition.js"></script>

</body>

</html>
