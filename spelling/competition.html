<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Competition</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#2563eb;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

#timer{
font-size:50px;
color:red;
margin:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.start{background:green;}
.correct{background:#16a34a;}
.wrong{background:#dc2626;}
.skip{background:#f59e0b;}

</style>

</head>

<body>

<div class="header">

<h2>Spelling Competition</h2>

</div>


<div class="container">

<div class="card">

<h3>Student: <span id="studentName"></span></h3>

<h3>Round: <span id="round">1</span></h3>

<h2 id="word">Ready</h2>

<div id="timer">0</div>


<button class="start" onclick="startWord()">Start</button>
<button class="correct" onclick="correct()">Correct</button>
<button class="wrong" onclick="wrong()">Wrong</button>
<button class="skip" onclick="skip()">Next Word</button>

<h3>Score: <span id="score">0</span></h3>

</div>

</div>


<script src="js/competition.js"></script>

</body>

</html>
