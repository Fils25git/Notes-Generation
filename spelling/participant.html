<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Participant Screen</title>

<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:#3b82f6;
color:white;

display:flex;

justify-content:center;
align-items:center;

height:100vh;

}

.container{

text-align:center;
width:90%;

}

.card{

background:white;
color:black;

padding:30px;

border-radius:20px;

margin-bottom:30px;

}

.big{

font-size:55px;
font-weight:bold;

margin:20px;

}

button{

padding:18px 40px;

font-size:30px;

border:none;
border-radius:12px;

cursor:pointer;

margin:10px;

}

.start{

background:#22c55e;
color:white;

}

.done{

background:#f59e0b;
color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>
Round
</h2>

<div
class="big"
id="round">

1/3

</div>


<h2>
Word Number
</h2>

<div
class="big"
id="wordNumber">

1

</div>

</div>


<button
class="start">

START

</button>


<button
class="done">

DONE

</button>

</div>

<script src="js/participant.js"></script>

</body>

</html>
