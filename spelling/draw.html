<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Student Draw Assignment</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#7c3aed;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:14px;
border-bottom:1px solid #ddd;
text-align:center;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.edit{
background:#2563eb;
}

.modal{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);

}

.modalBox{

background:white;
width:400px;
margin:100px auto;
padding:20px;
border-radius:10px;

}

input{

width:100%;
padding:10px;
margin:10px 0;

}

.save{

background:#16a34a;
width:100%;

}

.close{

background:#ef4444;
width:100%;
margin-top:10px;

}

.notset{

color:red;
font-style:italic;

}

</style>

</head>

<body>

<div class="header">

<h2>Participants Draw Assignment</h2>

</div>


<div class="container">

<table>

<thead>

<tr>

<th>Name</th>
<th>Gender</th>
<th>Draw Number</th>
<th>Order Number</th>
<th>Action</th>

</tr>

</thead>

<tbody id="studentList">

</tbody>

</table>

</div>


<!-- Modal -->

<div class="modal"
id="modal">

<div class="modalBox">

<h3>Edit Draw</h3>

<input
type="hidden"
id="studentId">

<label>Draw Number</label>

<input
type="number"
id="drawNumber">


<label>Order Number</label>

<input
type="number"
id="drawOrder">


<button
class="save"
onclick="saveDraw()">

Save

</button>


<button
class="close"
onclick="closeModal()">

Close

</button>

</div>

</div>


<script src="js/draw.js"></script>

</body>

  </html>
