<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Manage Students</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f2f2f2;
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

h1{

margin:0;

}

button{

padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;

}

.addBtn{

background:#4CAF50;
color:white;

}

.editBtn{

background:#2196F3;
color:white;

}

.deleteBtn{

background:#f44336;
color:white;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:15px;
border-bottom:1px solid #ddd;
text-align:left;

}

.modal{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);

}

.modal-content{

background:white;
width:400px;
padding:20px;
margin:100px auto;
border-radius:10px;

}

input,select{

width:100%;
padding:10px;
margin:10px 0;

}

.saveBtn{

background:green;
color:white;

}

.cancelBtn{

background:gray;
color:white;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>
Registered Students
</h1>

<button
class="addBtn"
onclick="openAddModal()">

+ Add Student

</button>

</div>


<table>

<thead>

<tr>

<th>Name</th>
<th>Gender</th>
<th>Class</th>
<th>Actions</th>

</tr>

</thead>

<tbody
id="studentTable">

</tbody>

</table>

</div>



<div
class="modal"
id="studentModal">

<div
class="modal-content">

<h2
id="modalTitle">

Add Student

</h2>


<input
type="hidden"
id="studentId">


<label>

Student Full Name

</label>

<input
type="text"
id="studentName">


<label>

Gender

</label>

<select
id="gender">

<option>
Male
</option>

<option>
Female
</option>

</select>


<label>

Class

</label>

<input
type="text"
id="className">


<button
class="saveBtn"
onclick="saveStudent()">

Save

</button>


<button
class="cancelBtn"
onclick="closeModal()">

Cancel

</button>

</div>

</div>



<script>

let editing=false;


function openAddModal(){

editing=false;

document
.getElementById(
"modalTitle"
)
.innerText=
"Add Student";

clearFields();

showModal();

}



function editStudent(
id,
name,
gender,
className
){

editing=true;

document
.getElementById(
"modalTitle"
)
.innerText=
"Edit Student";


document
.getElementById(
"studentId"
)
.value=id;


document
.getElementById(
"studentName"
)
.value=name;


document
.getElementById(
"gender"
)
.value=gender;


document
.getElementById(
"className"
)
.value=className;


showModal();

}



function showModal(){

document
.getElementById(
"studentModal"
)
.style.display=
"block";

}



function closeModal(){

document
.getElementById(
"studentModal"
)
.style.display=
"none";

}



function clearFields(){

document
.getElementById(
"studentId"
)
.value="";


document
.getElementById(
"studentName"
)
.value="";


document
.getElementById(
"gender"
)
.value="Male";


document
.getElementById(
"className"
)
.value="";

}
  async function loadStudents(){

const response=
await fetch(
"/.netlify/functions/spellingGetStudents"
);

const data=
await response.json();

let html="";

data.students.forEach(student=>{

html+=`

<tr>

<td>
${student.full_name}
</td>

<td>
${student.gender}
</td>

<td>
${student.class_name}
</td>

<td>

<button
class="editBtn"
onclick="editStudent(

${student.id},

'${student.full_name}',

'${student.gender}',

'${student.class_name}'

)">

Edit

</button>


<button
class="deleteBtn"
onclick="deleteStudent(

${student.id}

)">

Delete

</button>

</td>

</tr>

`;

});

document
.getElementById(
"studentTable"
)
.innerHTML=
html;

}



async function saveStudent(){

const data={

id:

document
.getElementById(
"studentId"
)
.value,

full_name:

document
.getElementById(
"studentName"
)
.value,

gender:

document
.getElementById(
"gender"
)
.value,

class_name:

document
.getElementById(
"className"
)
.value

};


let url=
editing

?

"/.netlify/functions/spellingUpdateStudent"

:

"/.netlify/functions/spellingAddStudent";


await fetch(

url,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify(data)

}

);


closeModal();

loadStudents();

}



async function deleteStudent(id){

let confirmDelete=
confirm(
"Delete student?"
);

if(!confirmDelete)
return;


await fetch(

"/.netlify/functions/spellingDeleteStudent",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:
JSON.stringify({

id

})

}

);


loadStudents();

}


loadStudents();

</script>

</body>
  </html>
