<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Timer Screen</title>

<style>

body{

margin:0;
font-family:Arial,sans-serif;
background:#111827;
color:white;

height:100vh;

display:flex;

justify-content:center;
align-items:center;

}

.container{

width:95%;
text-align:center;

}

.top{

display:flex;

justify-content:space-around;

flex-wrap:wrap;

margin-bottom:30px;

}

.card{

background:#1f2937;

padding:20px;

border-radius:15px;

min-width:180px;

margin:10px;

}

.label{

font-size:20px;

}

.value{

font-size:35px;
font-weight:bold;

margin-top:10px;

}

#timer{

font-size:180px;
font-weight:bold;

margin-top:50px;

}

</style>

</head>

<body>

<div class="container">

<div class="top">

<div class="card">

<div class="label">
Participant
</div>

<div
class="value"
id="studentName">

Loading...

</div>

</div>


<div class="card">

<div class="label">
Round
</div>

<div
class="value"
id="round">

1/3

</div>

</div>


<div class="card">

<div class="label">
Round Score
</div>

<div
class="value"
id="roundScore">

0

</div>

</div>


<div class="card">

<div class="label">
Total Score
</div>

<div
class="value"
id="totalScore">

0

</div>

</div>

</div>


<div id="timer">

0

</div>

</div>

<script src="js/timer.js"></script>

</body>

</html>
