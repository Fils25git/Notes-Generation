<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Results</title>

  <link rel="stylesheet" href="style.css">

  <style>

.results-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.analysis-box{
    margin-top:25px;
    background:#f8fafc;
    padding:20px;
    border-radius:12px;
    border:1px solid #dbeafe;
}

.analysis-box p{
    margin:10px 0;
    font-size:15px;
}

.grade{
    padding:4px 10px;
    border-radius:6px;
    font-weight:600;
    font-size:13px;
    color:white;
}

.grade-a{background:#16a34a;}
.grade-b{background:#22c55e;}
.grade-c{background:#3b82f6;}
.grade-d{background:#f59e0b;}
.grade-e{background:#fb923c;}
.grade-s{background:#ef4444;}
.grade-f{background:#991b1b;}

.download-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.download-btn:hover{
    background:#1d4ed8;
}

  </style>
</head>
<body>

<script>

const role = localStorage.getItem("role");
const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

if(role !== "teacher" && role !== "sector_admin"){
    alert("Access denied");
    window.location.href = "index.html";
}

</script>

<header>
  <h1>TEACHER RESULTS</h1>
  <p>View performance of your students</p>
</header>

<main class="dashboard-container">

  <div class="card" style="max-width:1100px; width:95%;">

    <div class="results-header">

      <div>
        <h2 id="tableTitle">
          Students Performance
        </h2>
      </div>

      <button class="download-btn"
        onclick="downloadTable()">
        Download
      </button>

    </div>

    <label>Select Class & Subject</label>

    <select id="assignmentSelect"
      onchange="loadResults()">
    </select>

    <div class="table-container">

      <table id="resultsTable">

        <thead>
          <tr>
            <th>#</th>
            <th>Student Name</th>
            <th>Marks</th>
            <th>Category</th>
          </tr>
        </thead>

        <tbody id="resultsBody">
          <tr>
            <td colspan="4">
              Loading...
            </td>
          </tr>
        </tbody>

      </table>

    </div>

    <div class="analysis-box">

      <h3>Marks Analysis</h3>

      <p id="passCount"></p>
      <p id="failCount"></p>
      <p id="passPercentage"></p>

    </div>

  </div>

</main>

<script>

// LOAD ASSIGNMENTS
async function loadAssignments(){

    const res = await fetch(
`/.netlify/functions/getTeacher?school=${currentUser.school}`
    );

    const data = await res.json();

    const select =
    document.getElementById("assignmentSelect");

    select.innerHTML = "";

    data.forEach(t => {

        if(t.id != currentUser.id) return;

        t.assignments.forEach(a => {

            select.innerHTML += `
            <option value="${a.class_name}|${a.subject}">
              ${a.class_name} - ${a.subject}
            </option>
            `;
        });
    });

    // AUTO LOAD FIRST
    if(select.options.length > 0){
        loadResults();
    }
}

// CATEGORY
function getCategory(mark){

    if(mark >= 80){
        return {
            text:"A (Excellent)",
            class:"grade-a"
        };
    }

    if(mark >= 75){
        return {
            text:"B (Very Good)",
            class:"grade-b"
        };
    }

    if(mark >= 70){
        return {
            text:"C (Good)",
            class:"grade-c"
        };
    }

    if(mark >= 65){
        return {
            text:"D (Satisfactory)",
            class:"grade-d"
        };
    }

    if(mark >= 60){
        return {
            text:"E (Adequate)",
            class:"grade-e"
        };
    }

    if(mark >= 50){
        return {
            text:"S (Minimum Pass)",
            class:"grade-s"
        };
    }

    return {
        text:"F (Fail)",
        class:"grade-f"
    };
}

// LOAD RESULTS
async function loadResults(){

    const value =
    document.getElementById("assignmentSelect").value;

    if(!value) return;

    const [class_name, subject] =
    value.split("|");

    document.getElementById("tableTitle")
    .innerText =
`${class_name} Students Performance in ${subject}`;

    const res = await fetch(
`/.netlify/functions/getMarks?school=${currentUser.school}&class_name=${class_name}&subject=${subject}`
    );

    const data = await res.json();

    const body =
    document.getElementById("resultsBody");

    body.innerHTML = "";

    if(!res.ok){

        body.innerHTML = `
        <tr>
          <td colspan="4">
            ${data.message}
          </td>
        </tr>`;

        return;
    }

    let pass = 0;
    let fail = 0;

    data.forEach((s,index)=>{

        const mark = Number(s.mark || 0);

        const category =
        getCategory(mark);

        if(mark >= 50){
            pass++;
        }else{
            fail++;
        }

        body.innerHTML += `
        <tr>

          <td>${index + 1}</td>

          <td>${s.student_name}</td>

          <td>${mark}</td>

          <td>
            <span class="grade ${category.class}">
              ${category.text}
            </span>
          </td>

        </tr>
        `;
    });

    const total = data.length;

    const percentage =
    total > 0
    ? ((pass / total) * 100).toFixed(2)
    : 0;

    document.getElementById("passCount")
    .innerHTML =
`Students who passed are: <b>${pass}</b>`;

    document.getElementById("failCount")
    .innerHTML =
`Students who failed are: <b>${fail}</b>`;

    document.getElementById("passPercentage")
    .innerHTML =
`They passed on percentage of: <b>${percentage}%</b>`;
}

// DOWNLOAD TABLE
function downloadTable(){

    const title =
    document.getElementById("tableTitle")
    .innerText;

    const table =
    document.getElementById("resultsTable")
    .outerHTML;

    const content = `
    <html>
    <head>
      <title>${title}</title>

      <style>

      body{
          font-family:Arial;
          padding:20px;
      }

      h2{
          text-align:center;
          margin-bottom:20px;
      }

      table{
          width:100%;
          border-collapse:collapse;
      }

      th, td{
          border:1px solid #000;
          padding:10px;
          text-align:left;
      }

      th{
          background:#f1f5f9;
      }

      </style>

    </head>

    <body>

      <h2>${title}</h2>

      ${table}

    </body>
    </html>
    `;

    const win = window.open("", "", "width=900,height=700");

    win.document.write(content);

    win.document.close();

    win.print();
}

// INIT
loadAssignments();

</script>

</body>
    </html>
