<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students</title>

<style>

body{
font-family:'Segoe UI', Arial;
margin:0;
background:#f4f6fb;
color:#222;
}

/* HEADER */
header{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
text-align:center;
padding:20px;
}

header h1{margin:0;font-size:22px;}

.btn-add{
margin-top:10px;
background:white;
color:#1d4ed8;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* CONTAINER */
.container{
width:95%;
max-width:1000px;
margin:auto;
padding:20px;
}

/* CLASS SECTION */
.class-box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:25px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.class-title{
font-size:18px;
color:#1d4ed8;
margin-bottom:10px;
border-left:4px solid #1d4ed8;
padding-left:8px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#1d4ed8;
color:white;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f0f6ff;
}

/* BUTTONS */
.edit{
background:#f59e0b;
color:white;
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:5px;
}

.delete{
background:#ef4444;
color:white;
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:320px;
}

.modal-box input,select{
width:100%;
padding:8px;
margin:8px 0;
}

.save{
background:#2563eb;
color:white;
width:100%;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.close{
background:#ef4444;
color:white;
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

</style>
</head>

<body>

<script>
const role = localStorage.getItem("role");
if(role !== "school_admin"){
alert("Access denied");
location.href="login.html";
}
</script>

<header>
<h1>REGISTERED STUDENTS</h1>
<button class="btn-add" onclick="openModal()">+ Add Student</button>
</header>

<div class="container">

<!-- P6 -->
<div id="p6Box" class="class-box">
<div class="class-title">Primary 6 Students</div>
<table>
<thead>
<tr>
<th>Name</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="p6Table"></tbody>
</table>
</div>

<!-- S3 -->
<div id="s3Box" class="class-box">
<div class="class-title">Senior 3 Students</div>
<table>
<thead>
<tr>
<th>Name</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="s3Table"></tbody>
</table>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3 id="modalTitle">Add Student</h3>

<input type="hidden" id="editId">

<select id="className">
<option value="">Select Class</option>
<option>Primary 6</option>
<option>Senior 3</option>
</select>

<input type="text" id="name" placeholder="Student Name">

<button class="save" onclick="saveStudent()">Save</button>
<button class="close" onclick="closeModal()">Close</button>

</div>
</div>

<script>

const currentUser = JSON.parse(localStorage.getItem("currentUser"));
let editMode = false;

// LOAD
async function loadStudents(){

const res = await fetch(`/.netlify/functions/getStudents?school_name=${currentUser.school}`);
const data = await res.json();

const p6 = document.getElementById("p6Table");
const s3 = document.getElementById("s3Table");

p6.innerHTML="";
s3.innerHTML="";

let hasP6=false;
let hasS3=false;

data.forEach(s=>{

const row = `
<tr>
<td>${s.student_name}</td>
<td>
<button class="edit" onclick="editStudent('${s.id}','${s.student_name}','${s.class_name}')">Edit</button>
<button class="delete" onclick="deleteStudent('${s.id}')">Delete</button>
</td>
</tr>
`;

if(s.class_name==="Primary 6"){
p6.innerHTML += row;
hasP6=true;
}

if(s.class_name==="Senior 3"){
s3.innerHTML += row;
hasS3=true;
}

});

// hide empty classes
document.getElementById("p6Box").style.display = hasP6 ? "block":"none";
document.getElementById("s3Box").style.display = hasS3 ? "block":"none";

}

// OPEN
function openModal(){
editMode=false;
document.getElementById("modalTitle").innerText="Add Student";
document.getElementById("editId").value="";
document.getElementById("name").value="";
document.getElementById("className").value="";
document.getElementById("modal").style.display="flex";
}

// EDIT
function editStudent(id,name,cls){
editMode=true;
document.getElementById("modalTitle").innerText="Edit Student";
document.getElementById("editId").value=id;
document.getElementById("name").value=name;
document.getElementById("className").value=cls;
document.getElementById("modal").style.display="flex";
}

// CLOSE
function closeModal(){
document.getElementById("modal").style.display="none";
}

// SAVE
async function saveStudent(){

const id=document.getElementById("editId").value;
const student_name=document.getElementById("name").value;
const class_name=document.getElementById("className").value;

let url="/.netlify/functions/createStudents";
let body={student_name,class_name,school_name:currentUser.school};

if(editMode){
url="/.netlify/functions/updateStudent";
body.id=id;
}

await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

closeModal();
loadStudents();
}

// DELETE
async function deleteStudent(id){

if(!confirm("Delete student?")) return;

await fetch("/.netlify/functions/deleteStudent",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
});

loadStudents();
}

loadStudents();

</script>

</body>
  </html>
