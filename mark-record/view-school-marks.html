<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Marks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ================= GLOBAL ================= */
body{
    margin:0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background:#f3f6fb;
    color:#222;
}

/* ================= HEADER ================= */
header{
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color:white;
    text-align:center;
    padding:25px 15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

header h1{
    margin:0;
    font-size:22px;
    letter-spacing:1px;
}

header p{
    margin-top:5px;
    font-size:14px;
    opacity:0.9;
}

/* ================= TABLE CONTAINER ================= */
.table-container{
    width:95%;
    max-width:1200px;
    margin:25px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* SECTION TITLE */
.table-container h2{
    text-align:left;
    margin-bottom:15px;
    color:#1d4ed8;
    font-size:18px;
    border-left:4px solid #1d4ed8;
    padding-left:10px;
}

/* ================= TABLE ================= */
table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}

/* HEADER ROW */
thead{
    background:#1d4ed8;
    color:white;
}

th, td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #eee;
}

/* ROW HOVER */
tbody tr:hover{
    background:#f0f6ff;
}

/* ================= TABLE BORDERS ================= */
table th{
    font-weight:600;
}

/* ================= HIGHLIGHT TOTAL ================= */
td b{
    color:#1d4ed8;
}

/* ================= MOBILE RESPONSIVE ================= */
@media(max-width:768px){

    table{
        font-size:12px;
    }

    th, td{
        padding:6px;
    }

    header h1{
        font-size:18px;
    }

    .table-container{
        padding:10px;
    }
}
  </style>
</head>
<body>

<script>
const role = localStorage.getItem("role");

if(role !== "school_admin"){
    alert("Access denied");
    window.location.href = "login.html";
}
</script>

<header>
  <h1>VIEW SCHOOL MARKS</h1>
  <p>Examination Results Dashboard</p>
</header>

<!-- P6 SECTION -->
<div class="table-container" id="p6Section">
  <h2>PRIMARY 6 RESULTS</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Student</th>
        <th>Eng</th>
        <th>Math</th>
        <th>Kiny</th>
        <th>SST</th>
        <th>Sci</th>
        <th>Total</th>
        <th>%</th>
        <th>Pos</th>
      </tr>
    </thead>
    <tbody id="p6Body"></tbody>
  </table>
</div>

<!-- S3 SECTION -->
<div class="table-container" id="s3Section" style="display:none;">
  <h2>SENIOR 3 RESULTS</h2>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Student</th>
        <th>Eng</th>
        <th>Math</th>
        <th>Kiny</th>
        <th>Chem</th>
        <th>Phys</th>
        <th>Bio</th>
        <th>Geo</th>
        <th>Hist</th>
        <th>Ent</th>
        <th>Total</th>
        <th>%</th>
        <th>Pos</th>
      </tr>
    </thead>
    <tbody id="s3Body"></tbody>
  </table>
</div>

<script>

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

async function loadMarks(){

    const response = await fetch(
        `/.netlify/functions/getStudents?school_name=${currentUser.school}`
    );

    const data = await response.json();

    const p6Body = document.getElementById("p6Body");
    const s3Body = document.getElementById("s3Body");

    p6Body.innerHTML = "";
    s3Body.innerHTML = "";

    if(!response.ok){
        alert(data.message);
        return;
    }

    let hasP6 = false;
    let hasS3 = false;

    data.forEach((s, i) => {

        // PRIMARY 6
        if(s.class_name === "Primary 6"){
            hasP6 = true;

            p6Body.innerHTML += `
            <tr>
                <td>${i + 1}</td>
                <td>${s.student_name}</td>
                <td>${s.english}</td>
                <td>${s.mathematics}</td>
                <td>${s.kinyarwanda}</td>
                <td>${s.social_studies}</td>
                <td>${s.science}</td>
                <td><b>${s.total}</b></td>
                <td><b>${s.percentage}%</b></td>
                <td><b>${s.position}</b></td>
            </tr>`;
        }

        // SENIOR 3
        if(s.class_name === "Senior 3"){
            hasS3 = true;

            s3Body.innerHTML += `
            <tr>
                <td>${i + 1}</td>
                <td>${s.student_name}</td>
                <td>${s.english}</td>
                <td>${s.mathematics}</td>
                <td>${s.kinyarwanda}</td>
                <td>${s.chemistry}</td>
                <td>${s.physics}</td>
                <td>${s.biology}</td>
                <td>${s.geography}</td>
                <td>${s.history}</td>
                <td>${s.entrepreneurship}</td>
                <td><b>${s.total}</b></td>
                <td><b>${s.percentage}%</b></td>
                <td><b>${s.position}</b></td>
            </tr>`;
        }

    });

    // CONTROL VISIBILITY
    if(!hasS3){
        document.getElementById("s3Section").style.display = "none";
    } else {
        document.getElementById("s3Section").style.display = "block";
    }

}

loadMarks();

</script>

</body>
</html>
