<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sector Admin Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SECTOR ADMIN REGISTRATION</h1>
  <p>Create system owner account</p>
</header>

<main class="dashboard-container">
  <div class="card">

    <h2>Register Sector Admin</h2>

    <label>Full Name</label>
    <input type="text" id="name">

    <label>Username</label>
    <input type="text" id="username">

    <label>Password</label>
    <input type="password" id="password">

    <button class="btn" onclick="signup()">Create Sector Admin</button>

  </div>
</main>

<script>
async function signup(){

    const name = document.getElementById("name").value.trim();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!name || !username || !password){
        alert("Fill all fields");
        return;
    }

    const response = await fetch("/.netlify/functions/signupSectorAdmin", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            full_name: name,
            username: username,
            password: password
        })
    });

    const result = await response.json();

    if(response.ok){
        alert(result.message);
        window.location.href = "login.html";
    }else{
        alert(result.message);
    }
}
</script>

</body>
</html>
