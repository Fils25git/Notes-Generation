<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SECTOR EDUCATION SYSTEM</h1>
  <p>Management dashboard</p>
</header>

<main class="dashboard-container">
  <div class="card">

    <h2 id="title">Dashboard</h2>

    <!-- SECTOR ADMIN PANEL -->
    <div id="sectorPanel" style="display:none;">
      <h3>Add School Admin</h3>

      <label>School Admin Full Name</label>
      <input type="text" id="schoolAdminName">

      <label>Username</label>
      <input type="text" id="schoolAdminUsername">

      <label>Password</label>
      <input type="password" id="schoolAdminPassword">

      <label>Choose School</label>
      <select id="school">
        <option>EP KABIRIZI</option>
        <option>GS MUYUNZWE</option>
        <option>GIHORORO PS</option>
        <option>GS BWERAMVURA</option>
        <option>GATOVU N&PS</option>
        <option>GS KABUGA K</option>
        <option>GS NYARUTOVU</option>
        <option>EP NYAGATOVU</option>
      </select>

      <button class="btn" onclick="addSchoolAdmin()">Add School Admin</button>
    </div>

    <!-- SCHOOL ADMIN PANEL -->
    <div id="schoolPanel" style="display:none;">
      <h3>Add Teacher</h3>

      <label>Teacher Full Name</label>
      <input type="text" id="teacherName">

      <label>Username</label>
      <input type="text" id="teacherUsername">

      <label>Password</label>
      <input type="password" id="teacherPassword">

      <label>Choose Class</label>
      <select id="class" onchange="updateSubjects()">
        <option value="">-- Select Class --</option>
        <option>Primary 6</option>
        <option>Senior 3</option>
      </select>

      <label>Choose Subject</label>
      <select id="subject">
        <option value="">-- Select Subject --</option>
      </select>

      <button class="btn" onclick="addTeacher()">Add Teacher</button>
    </div>

  </div>
</main>

<script>

// GET ROLE
const role = localStorage.getItem("role");

if(role === "sector_admin"){
  document.getElementById("sectorPanel").style.display = "block";
  document.getElementById("title").innerText = "Sector Admin Dashboard";
}

if(role === "school_admin"){
  document.getElementById("schoolPanel").style.display = "block";
  document.getElementById("title").innerText = "School Admin Dashboard";
}

// SUBJECT CONTROL
function updateSubjects(){
    const selectedClass = document.getElementById("class").value;
    const subject = document.getElementById("subject");

    subject.innerHTML = '<option value="">-- Select Subject --</option>';

    if(selectedClass === "Primary 6"){
        const p6 = [
            "ENGLISH",
            "MATHEMATICS",
            "KINYARWANDA",
            "SOCIAL AND RELIGIOUS STUDIES",
            "SCIENCE AND ELEMENTARY STUDIES"
        ];

        p6.forEach(s=>{
            subject.innerHTML += `<option>${s}</option>`;
        });
    }

    if(selectedClass === "Senior 3"){
        const s3 = [
            "ENGLISH",
            "MATHEMATICS",
            "KINYARWANDA",
            "CHEMISTRY",
            "PHYSICS",
            "BIOLOGY",
            "GEOGRAPHY",
            "HISTORY",
            "ENTREPRENEURSHIP"
        ];

        s3.forEach(s=>{
            subject.innerHTML += `<option>${s}</option>`;
        });
    }
}

// SAVE SCHOOL ADMIN
function addSchoolAdmin(){
  const name = document.getElementById("schoolAdminName").value;
  const username = document.getElementById("schoolAdminUsername").value;
  const password = document.getElementById("schoolAdminPassword").value;
  const school = document.getElementById("school").value;

  if(!name || !username || !password){
      alert("Please fill all school admin fields");
      return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({
      name,
      username,
      password,
      role: "school_admin",
      school
  });

  localStorage.setItem("users", JSON.stringify(users));

  alert("School Admin added successfully");
}

// SAVE TEACHER
function addTeacher(){
  const name = document.getElementById("teacherName").value;
  const username = document.getElementById("teacherUsername").value;
  const password = document.getElementById("teacherPassword").value;
  const className = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;

  if(!name || !username || !password || !className || !subject){
      alert("Please fill all teacher fields");
      return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({
      name,
      username,
      password,
      role: "teacher",
      className,
      subject
  });

  localStorage.setItem("users", JSON.stringify(users));

  alert("Teacher added successfully");
}

</script>

</body>
</html>
