<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SECTOR EDUCATION SYSTEM</h1>
  <p>Role-based management panel</p>
</header>

<main class="dashboard-container">
  <div class="card">

    <h2>Select Role</h2>

    <select id="role" onchange="showForm()">
      <option value="">-- Select Role --</option>
      <option value="sector">Sector Admin</option>
      <option value="school">School Admin</option>
    </select>

    <!-- SECTOR ADMIN FORM -->
    <div id="sectorForm" style="display:none; margin-top:20px;">
      <h3>Add School Admin</h3>

      <label>School Admin Name</label>
      <input type="text" id="schoolAdminName" placeholder="Enter name">

      <label>Choose School</label>
      <select id="school1">
        <option>EP KABIRIZI</option>
        <option>GS MUYUNZWE</option>
        <option>GIHORORO PS</option>
        <option>GS BWERAMVURA</option>
        <option>GATOVU N&PS</option>
        <option>GS KABUGA K</option>
        <option>GS NYARUTOVU</option>
        <option>EP NYAGATOVU</option>
      </select>

      <button class="btn" onclick="addSchoolAdmin()">Add School Admin</button>
    </div>

    <!-- SCHOOL ADMIN FORM -->
    <div id="schoolForm" style="display:none; margin-top:20px;">
      <h3>Add Teacher</h3>

      <label>Teacher Name</label>
      <input type="text" id="teacherName" placeholder="Enter teacher name">

      <label>Choose Class</label>
      <select id="class">
        <option>Primary 6</option>
        <option>Senior 3</option>
      </select>

      <label>Choose Subject</label>
      <select id="subject">
        <option>ENGLISH</option>
        <option>MATHEMATICS</option>
        <option>KINYARWANDA</option>
        <option>SCIENCE</option>
        <option>CHEMISTRY</option>
        <option>PHYSICS</option>
        <option>BIOLOGY</option>
        <option>GEOGRAPHY</option>
        <option>HISTORY</option>
        <option>ENTREPRENEURSHIP</option>
      </select>

      <button class="btn" onclick="addTeacher()">Add Teacher</button>
    </div>

  </div>
</main>

<script>

function showForm(){
  const role = document.getElementById("role").value;

  document.getElementById("sectorForm").style.display = "none";
  document.getElementById("schoolForm").style.display = "none";

  if(role === "sector"){
    document.getElementById("sectorForm").style.display = "block";
  }

  if(role === "school"){
    document.getElementById("schoolForm").style.display = "block";
  }
}

// TEMP STORAGE (later will go to database)

// Sector Admin adds School Admin
function addSchoolAdmin(){
  const name = document.getElementById("schoolAdminName").value;
  const school = document.getElementById("school1").value;

  if(!name){
    alert("Enter school admin name");
    return;
  }

  let data = JSON.parse(localStorage.getItem("schoolAdmins")) || [];

  data.push({name, school});

  localStorage.setItem("schoolAdmins", JSON.stringify(data));

  alert("School Admin added successfully");
}

// School Admin adds Teacher
function addTeacher(){
  const name = document.getElementById("teacherName").value;
  const className = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;

  if(!name){
    alert("Enter teacher name");
    return;
  }

  let data = JSON.parse(localStorage.getItem("teachers")) || [];

  data.push({name, className, subject});

  localStorage.setItem("teachers", JSON.stringify(data));

  alert("Teacher added successfully");
}

</script>

</body>
  </html>
