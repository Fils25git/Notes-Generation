<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SECTOR EDUCATION SYSTEM</h1>
  <p>Management dashboard</p>
</header>

<main class="dashboard-container">
  <div class="card">

    <h2 id="title">Dashboard</h2>

    <!-- SECTOR ADMIN PANEL -->
    <div id="sectorPanel" style="display:none;">
      <h3>Add School Admin</h3>

      <label>School Admin Name</label>
      <input type="text" id="schoolAdminName">

      <label>Choose School</label>
      <select id="school">
        <option>EP KABIRIZI</option>
        <option>GS MUYUNZWE</option>
        <option>GIHORORO PS</option>
        <option>GS BWERAMVURA</option>
        <option>GATOVU N&PS</option>
        <option>GS KABUGA K</option>
        <option>GS NYARUTOVU</option>
        <option>EP NYAGATOVU</option>
      </select>

      <button class="btn" onclick="addSchoolAdmin()">Add School Admin</button>
    </div>

    <!-- SCHOOL ADMIN PANEL -->
    <div id="schoolPanel" style="display:none;">
      <h3>Add Teacher</h3>

      <label>Teacher Name</label>
      <input type="text" id="teacherName">

      <label>Class</label>
      <select id="class">
        <option>Primary 6</option>
        <option>Senior 3</option>
      </select>

      <label>Subject</label>
      <select id="subject">
        <option>ENGLISH</option>
        <option>MATHEMATICS</option>
        <option>KINYARWANDA</option>
        <option>SCIENCE</option>
        <option>CHEMISTRY</option>
        <option>PHYSICS</option>
        <option>BIOLOGY</option>
        <option>GEOGRAPHY</option>
        <option>HISTORY</option>
        <option>ENTREPRENEURSHIP</option>
      </select>

      <button class="btn" onclick="addTeacher()">Add Teacher</button>
    </div>

  </div>
</main>

<script>

// GET ROLE FROM LOGIN
const role = localStorage.getItem("role");

// SHOW ONLY WHAT USER IS ALLOWED
if(role === "sector_admin"){
  document.getElementById("sectorPanel").style.display = "block";
  document.getElementById("title").innerText = "Sector Admin Dashboard";
}

if(role === "school_admin"){
  document.getElementById("schoolPanel").style.display = "block";
  document.getElementById("title").innerText = "School Admin Dashboard";
}

// STORE DATA TEMPORARILY (later DB)
function addSchoolAdmin(){
  const name = document.getElementById("schoolAdminName").value;
  const school = document.getElementById("school").value;

  let data = JSON.parse(localStorage.getItem("schoolAdmins")) || [];

  data.push({name, school});

  localStorage.setItem("schoolAdmins", JSON.stringify(data));

  alert("School Admin added");
}

function addTeacher(){
  const name = document.getElementById("teacherName").value;
  const className = document.getElementById("class").value;
  const subject = document.getElementById("subject").value;

  let data = JSON.parse(localStorage.getItem("teachers")) || [];

  data.push({name, className, subject});

  localStorage.setItem("teachers", JSON.stringify(data));

  alert("Teacher added");
}

</script>

</body>
</html>
