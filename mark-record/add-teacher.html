<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers Management</title>
  <link rel="stylesheet" href="style.css">

<style>

/* MODAL BACKDROP */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

/* MODAL BOX */
.modal-content {
    background: white;
    padding: 25px;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* INPUTS */
.modal-content input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* BUTTONS */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    color: white;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
}

.btn:hover {
    transform: translateY(-2px);
}

.btn-danger { background:#ef4444; }
.btn-warning { background:#f59e0b; }
.btn-success { background:#22c55e; }

</style>
</head>

<body>

<script>
const role = localStorage.getItem("role");
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(role !== "school_admin"){
    alert("Access denied");
    window.location.href = "login.html";
}
</script>

<header>
  <h1>TEACHERS MANAGEMENT</h1>
</header>

<main class="dashboard-container">

  <div class="card" style="max-width:1000px; width:95%;">

    <div style="display:flex; justify-content:space-between;">
      <h2>Teachers List</h2>
      <button class="btn" onclick="openAddTeacher()">+ Add Teacher</button>
    </div>

    <table style="width:100%;">
      <thead>
        <tr>
          <th>#</th>
          <th>Full Name</th>
          <th>Username</th>
          <th>Class</th>
          <th>Subjects</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="teacherTable"></tbody>
    </table>

  </div>

</main>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h2 id="modalTitle">Add Teacher</h2>

    <input type="hidden" id="editId">

    <label>Full Name</label>
    <input type="text" id="teacherName">

    <label>Phone</label>
    <input type="tel" id="teacherUsername">

    <label>Password</label>
    <input type="password" id="teacherPassword">

    <label>Class</label>
    <select id="class" onchange="updateSubjects()">
      <option value="">-- Select Class --</option>
      <option>Primary 6</option>
      <option>Senior 3</option>
    </select>

    <!-- ✅ CHANGED TO MULTIPLE -->
    <label>Subjects</label>
    <select id="subject" multiple>
      <option value="">-- Select Subject --</option>
    </select>

    <button class="btn btn-success" onclick="saveTeacher()">Save</button>
    <button class="btn btn-danger" onclick="closeModal()">Cancel</button>

  </div>
</div>

<script>

let editMode = false;

// LOAD
async function loadTeachers(){

const res = await fetch(
`/.netlify/functions/getTeacher?role=school_admin&school=${encodeURIComponent(currentUser.school)}`
);

const data = await res.json();

const table = document.getElementById("teacherTable");
table.innerHTML = "";

data.forEach((t, index) => {

const subjects = t.assignments
? t.assignments.map(a => a.subject).join(", ")
: t.subject;

table.innerHTML += `
<tr>
<td>${index+1}</td>
<td>${t.full_name}</td>
<td>${t.username}</td>
<td>${t.class_name}</td>
<td>${subjects}</td>
<td>
<button class="btn btn-warning btn-sm">Edit</button>
</td>
</tr>
`;
});
}

// ADD
function openAddTeacher(){
editMode = false;
document.getElementById("modal").style.display="flex";
}

// CLOSE
function closeModal(){
document.getElementById("modal").style.display="none";
}

// SUBJECTS
function updateSubjects(){

const cls = document.getElementById("class").value;
const subject = document.getElementById("subject");

subject.innerHTML = "";

const p6 = ["ENGLISH","MATHEMATICS","KINYARWANDA","SST","SCIENCE"];
const s3 = ["ENGLISH","MATHEMATICS","KINYARWANDA","CHEMISTRY","PHYSICS"];

let list = cls === "Primary 6" ? p6 : s3;

list.forEach(s=>{
subject.innerHTML += `<option value="${s}">${s}</option>`;
});

}

// SAVE (✅ FIXED FOR MULTIPLE SUBJECTS)
async function saveTeacher(){

const full_name = document.getElementById("teacherName").value;
const username = document.getElementById("teacherUsername").value;
const password = document.getElementById("teacherPassword").value;
const class_name = document.getElementById("class").value;

const subjectSelect = document.getElementById("subject");

const subjects = Array.from(subjectSelect.selectedOptions)
.map(opt => opt.value);

if(!full_name || !username || !class_name || subjects.length === 0){
alert("Fill all fields");
return;
}

const payload = {
full_name,
username,
password,
role:"teacher",
school:currentUser.school,
class_name,
subjects   // ✅ ARRAY SENT
};

let url="/.netlify/functions/createUser";

const res = await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const result = await res.json();

if(!res.ok){
alert(result.message);
return;
}

alert("Saved");
closeModal();
loadTeachers();
}

loadTeachers();

</script>

</body>
  </html>
