<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers Management</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* MODAL BACKDROP */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

/* MODAL BOX */
.modal-content {
    background: white;
    padding: 25px;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* INPUTS */
.modal-content input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}
    /* =========================
   GLOBAL BUTTON STYLE
========================= */

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    padding: 12px 18px;
    border: none;
    border-radius: 10px;

    font-size: 14px;
    font-weight: 600;

    cursor: pointer;
    transition: all 0.25s ease;

    color: white;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);

    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* hover effect */
.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
}

/* active click effect */
.btn:active {
    transform: scale(0.98);
}

/* =========================
   DANGER BUTTON (DELETE / CANCEL)
========================= */

.btn-danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
}

.btn-danger:hover {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
}

/* =========================
   WARNING BUTTON (EDIT)
========================= */

.btn-warning {
    background: linear-gradient(135deg, #f59e0b, #d97706);
}

.btn-warning:hover {
    background: linear-gradient(135deg, #d97706, #b45309);
}

/* =========================
   SUCCESS BUTTON (SAVE)
========================= */

.btn-success {
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

.btn-success:hover {
    background: linear-gradient(135deg, #16a34a, #15803d);
}

/* =========================
   SMALL BUTTON (TABLE ACTIONS)
========================= */

.btn-sm {
    padding: 8px 12px;
    font-size: 12px;
    border-radius: 8px;
}

/* =========================
   FULL WIDTH BUTTON (FOR FORMS)
========================= */

.btn-block {
    width: 100%;
}

/* =========================
   ICON BUTTON (OPTIONAL)
========================= */

.btn-icon {
    gap: 6px;
}
  </style>
</head>
<body>

<script>
// PROTECT PAGE
const role = localStorage.getItem("role");
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(role !== "school_admin"){
    alert("Access denied");
    window.location.href = "login.html";
}
</script>

<header>
  <h1>TEACHERS MANAGEMENT</h1>
  <p>Manage teachers, classes and subjects</p>
</header>

<main class="dashboard-container">

  <div class="card" style="max-width:1000px; width:95%;">

    <!-- HEADER + ADD BUTTON -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h2>Teachers List</h2>

      <button class="btn" onclick="openAddTeacher()">
        + Add Teacher
      </button>
    </div>

    <!-- TABLE -->
    <table style="width:100%;">
      <thead>
        <tr>
          <th>#</th>
          <th>Full Name</th>
          <th>Username</th>
          <th>Class</th>
          <th>Subjects</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="teacherTable">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>

  </div>

</main>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h2 id="modalTitle">Add Teacher</h2>

    <input type="hidden" id="editId">

    <label>Full Name</label>
    <input type="text" id="teacherName">

    <label>Phone Number</label>
    <input type="tel" id="teacherUsername" placeholder=" Enter Phone; e.g,0786728623">

    <label>Password</label>
    <input type="password" id="teacherPassword">

    <label>Class</label>
    <select id="class" onchange="updateSubjects()">
      <option value="">-- Select Class --</option>
      <option>Primary 6</option>
      <option>Senior 3</option>
    </select>

    <label>Subject</label>
    <select id="subject">
      <option value="">-- Select Subject --</option>
    </select>

    <button class="btn btn-success btn-block" onclick="saveTeacher()">
      Save
    </button>

    <button class="btn btn-danger btn-block" onclick="closeModal()">
      Cancel
    </button>

  </div>
</div>

<script>

let editMode = false;

// ================= LOAD TEACHERS =================
async function loadTeachers(){

    const res = await fetch(
        `/.netlify/functions/getTeacher?school=${currentUser.school}`
    );

    const data = await res.json();

    const table = document.getElementById("teacherTable");
    table.innerHTML = "";

    if(!res.ok){
        table.innerHTML = `<tr><td colspan="6">Error loading data</td></tr>`;
        return;
    }

    if(data.length === 0){
        table.innerHTML = `<tr><td colspan="6">No teachers found</td></tr>`;
        return;
    }

    data.forEach((t, index) => {

        const subjects = t.assignments
    ? t.assignments.map(a => `${a.subject} (${a.class_name})`).join(", ")
    : t.subject;

        table.innerHTML += `
<tr>
    <td>${index + 1}</td>
    <td>${t.full_name}</td>
    <td>${t.username}</td>

    <td>
        ${t.assignments?.map(a =>
            `<div><b>${a.class_name}</b></div>`
        ).join("") || "-"}
    </td>

    <td>
        ${t.assignments?.map(a =>
            `<span style="display:inline-block;
            padding:3px 8px;
            margin:2px;
            background:#e0ecff;
            border-radius:6px;
            font-size:12px;">
            ${a.subject}
            </span>`
        ).join("") || "-"}
    </td>

    <td>
        <button class="btn btn-warning btn-sm"
            onclick="openEditTeacher('${t.id}','${t.full_name}','${t.username}','${t.class_name}','${t.subject}')">
            Edit
        </button>
    </td>
</tr>`;
    });
}

// ================= OPEN ADD =================
function openAddTeacher(){

    editMode = false;

    document.getElementById("modalTitle").innerText = "Add Teacher";

    document.getElementById("editId").value = "";
    document.getElementById("teacherName").value = "";
    document.getElementById("teacherUsername").value = "";
    document.getElementById("teacherPassword").value = "";
    document.getElementById("class").value = "";
    document.getElementById("subject").innerHTML =
        '<option value="">-- Select Subject --</option>';

    document.getElementById("modal").style.display = "flex";
}

// ================= OPEN EDIT =================
function openEditTeacher(id, name, username, className, subject){

    editMode = true;

    document.getElementById("modalTitle").innerText = "Edit Teacher";

    document.getElementById("editId").value = id;
    document.getElementById("teacherName").value = name;
    document.getElementById("teacherUsername").value = username;
    document.getElementById("class").value = className;
    document.getElementById("subject").innerHTML =
        `<option selected>${subject}</option>`;

    document.getElementById("modal").style.display = "flex";
}

// ================= CLOSE MODAL =================
function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// ================= SUBJECTS =================
function updateSubjects(){

    const selectedClass = document.getElementById("class").value;
    const subject = document.getElementById("subject");

    subject.innerHTML = '<option value="">-- Select Subject --</option>';

    const p6 = [
        "ENGLISH","MATHEMATICS","KINYARWANDA",
        "SOCIAL AND RELIGIOUS STUDIES","SCIENCE AND ELEMENTARY TECHNOLOGY"
    ];

    const s3 = [
        "ENGLISH","MATHEMATICS","KINYARWANDA",
        "CHEMISTRY","PHYSICS","BIOLOGY",
        "GEOGRAPHY","HISTORY","ENTREPRENEURSHIP"
    ];

    let list = selectedClass === "Primary 6" ? p6 : s3;

    list.forEach(sub=>{
        subject.innerHTML += `<option>${sub}</option>`;
    });
}

// ================= SAVE TEACHER =================
async function saveTeacher(){

    const full_name = document.getElementById("teacherName").value.trim();
    const username = document.getElementById("teacherUsername").value.trim();
    const password = document.getElementById("teacherPassword").value;
    const class_name = document.getElementById("class").value;
    const subject = document.getElementById("subject").value;

    if(!full_name || !username || !class_name || !subject){
        alert("Fill all required fields");
        return;
    }

    const payload = {
        full_name,
        username,
        password,
        role: "teacher",
        school: currentUser.school,
        class_name,
        subject
    };

    let url = "/.netlify/functions/createUser";

    if(editMode){
        payload.id = document.getElementById("editId").value;
        url = "/.netlify/functions/updateUser";
    }

    const res = await fetch(url, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    if(!res.ok){
        alert(result.message);
        return;
    }

    alert("Saved successfully");
    closeModal();
    loadTeachers();
}

// INIT
loadTeachers();

</script>

</body>
      </html>
