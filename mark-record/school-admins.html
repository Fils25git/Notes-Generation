<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Admins</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* MODAL BACKDROP */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

/* MODAL BOX */
.modal-content {
    background: white;
    padding: 25px;
    width: 90%;
    max-width: 400px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* INPUTS */
.modal-content input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}
    /* =========================
   GLOBAL BUTTON STYLE
========================= */

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    padding: 12px 18px;
    border: none;
    border-radius: 10px;

    font-size: 14px;
    font-weight: 600;

    cursor: pointer;
    transition: all 0.25s ease;

    color: white;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);

    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* hover effect */
.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    background: linear-gradient(135deg, #1d4ed8, #1e40af);
}

/* active click effect */
.btn:active {
    transform: scale(0.98);
}

/* =========================
   DANGER BUTTON (DELETE / CANCEL)
========================= */

.btn-danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
}

.btn-danger:hover {
    background: linear-gradient(135deg, #dc2626, #b91c1c);
}

/* =========================
   WARNING BUTTON (EDIT)
========================= */

.btn-warning {
    background: linear-gradient(135deg, #f59e0b, #d97706);
}

.btn-warning:hover {
    background: linear-gradient(135deg, #d97706, #b45309);
}

/* =========================
   SUCCESS BUTTON (SAVE)
========================= */

.btn-success {
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

.btn-success:hover {
    background: linear-gradient(135deg, #16a34a, #15803d);
}

/* =========================
   SMALL BUTTON (TABLE ACTIONS)
========================= */

.btn-sm {
    padding: 8px 12px;
    font-size: 12px;
    border-radius: 8px;
}

/* =========================
   FULL WIDTH BUTTON (FOR FORMS)
========================= */

.btn-block {
    width: 100%;
}

/* =========================
   ICON BUTTON (OPTIONAL)
========================= */

.btn-icon {
    gap: 6px;
  }
  </style>
</head>
<body>

<script>
const role = localStorage.getItem("role");

if(role !== "sector_admin"){
    alert("You are not allowed to Access this page");
    window.location.href = "index.html";
}
</script>

<header>
  <h1>SCHOOL MANAGEMENT</h1>
  <p>Manage schools and school administrators</p>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<main class="dashboard-container">

  <div class="card" style="max-width:900px; width:95%;">

    <!-- 🔥 HEADER + GLOBAL ADD BUTTON -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h2>School & Admin Overview</h2>

      <button class="btn" onclick="openAdd('')">
        + Add School Admin
      </button>
    </div>

    <table style="width:100%; margin-top:20px;">
      <thead>
        <tr>
          <th>#</th>
          <th>School</th>
          <th>Admin Name</th>
          <th>Username</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="schoolTable">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>

  </div>

</main>

<!-- ================= MODAL ================= -->
<div id="modal" class="modal">
  <div class="modal-content">

    <h2 id="modalTitle">Add School Admin</h2>

    <input type="hidden" id="editId">

    <label>School</label>
    <select id="adminSchool">
      <option value="">-- Select School --</option>
      <option>EP KABIRIZI</option>
      <option>GS MUYUNZWE</option>
      <option>GIHORORO PS</option>
      <option>GS BWERAMVURA</option>
      <option>GATOVU N&PS</option>
      <option>GS KABUGA K</option>
      <option>GS NYARUTOVU</option>
      <option>EP NYAGATOVU</option>
    </select>

    <label>Full Name</label>
    <input type="text" id="adminName">

    <label>Username</label>
    <input type="text" id="adminUsername">

    <label>Password</label>
    <input type="password" id="adminPassword">

    <button class="btn" onclick="saveAdmin()">Save</button>
    <button class="btn" style="background:red;" onclick="closeModal()">Cancel</button>

  </div>
</div>

<script>

let selectedSchool = "";
let editMode = false;

// LOAD TABLE
async function loadSchoolAdmins(){

    const res = await fetch("/.netlify/functions/getSchoolAdmins");
    const data = await res.json();

    const table = document.getElementById("schoolTable");
    table.innerHTML = "";

    if(!res.ok){
        table.innerHTML = `<tr><td colspan="5">Error loading data</td></tr>`;
        return;
    }

    if(data.length === 0){
        table.innerHTML = `<tr><td colspan="5">No school admins found</td></tr>`;
        return;
    }

    data.forEach((item, index) => {
        table.innerHTML += `
        <tr>
            <td>${index + 1}</td>
            <td>${item.school}</td>
            <td>${item.admin_name || "-"}</td>
            <td>${item.username || "-"}</td>
            <td>
                <button class="btn" onclick="openAdd('${item.school}')">Add</button>
                <button class="btn" style="background:#f59e0b;"
                    onclick="openEdit('${item.id}','${item.admin_name}','${item.username}','${item.school}')">
                    Edit
                </button>
            </td>
        </tr>`;
    });
}

// OPEN ADD MODAL
function openAdd(school){
    selectedSchool = school || "";
    editMode = false;

    document.getElementById("modalTitle").innerText = "Add School Admin";

    document.getElementById("editId").value = "";
    document.getElementById("adminName").value = "";
    document.getElementById("adminUsername").value = "";
    document.getElementById("adminPassword").value = "";
    document.getElementById("adminSchool").value = selectedSchool;

    document.getElementById("modal").style.display = "flex";
}

// OPEN EDIT MODAL
function openEdit(id, name, username, school){
    editMode = true;

    document.getElementById("modalTitle").innerText = "Edit School Admin";

    document.getElementById("editId").value = id;
    document.getElementById("adminName").value = name;
    document.getElementById("adminUsername").value = username;
    document.getElementById("adminSchool").value = school;

    document.getElementById("adminPassword").value = "";

    document.getElementById("modal").style.display = "flex";
}

// CLOSE MODAL
function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// SAVE ADMIN
async function saveAdmin(){

    const full_name = document.getElementById("adminName").value.trim();
    const username = document.getElementById("adminUsername").value.trim();
    const password = document.getElementById("adminPassword").value;
    const school = document.getElementById("adminSchool").value;

    if(!full_name || !username || !school){
        alert("Fill all required fields");
        return;
    }

    let payload = {
        full_name,
        username,
        password,
        role: "school_admin",
        school
    };

    let url = "/.netlify/functions/createUser";

    if(editMode){
        payload.id = document.getElementById("editId").value;
        url = "/.netlify/functions/updateUser";
    }

    const res = await fetch(url, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    if(!res.ok){
        alert(result.message);
        return;
    }

    alert("Saved successfully");
    closeModal();
    loadSchoolAdmins();
}

loadSchoolAdmins();
  // LOGOUT
function logout(){
localStorage.clear();
location.href="index.html";
  }

</script>

</body>
</html>
