<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record Marks</title>
  <link rel="stylesheet" href="style.css">
  <style>
    table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

th{
background:#1d4ed8;
color:white;
padding:8px;
text-align:left;
}

td{
padding:6px 8px;
border-bottom:1px solid #eee;
line-height:1.2;
}

tr{
height:40px;
}

input[type="number"]{
width:70px;
padding:4px;
height:28px;
box-sizing:border-box;
}
  </style>
</head>
<body>

<script>
const role = localStorage.getItem("role");
const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(role !== "teacher"){
    alert("you are not allowed to acces this page");
    window.location.href = "index.html";
}
</script>

<header>
  <h1>RECORD MARKS</h1>
  <p>Enter marks for assigned classes and subjects</p>

  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<main class="dashboard-container">
<div class="card" id="assignmentCard">

    <h2>Teacher Information</h2>

    <div id="teacherInfo">

        <p><b>Teacher Name:</b> <span id="teacherName"></span></p>

        <p><b>School:</b> <span id="teacherSchool"></span></p>

        <p><b>Class:</b> <span id="teacherClass"></span></p>

        <p><b>Subject:</b> <span id="teacherSubject"></span></p>

    </div>

    <!-- ONLY SHOWS IF MANY ASSIGNMENTS -->
    <div id="assignmentBox">

        <label>Select Class & Subject</label>

        <select id="assignmentSelect" onchange="changeAssignment()">
        </select>

    </div>

</div>

</main>

<div class="table-container">

  <h2>Student Marks Entry</h2>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Student Name</th>
        <th>Mark /100</th>
      </tr>
    </thead>

    <tbody id="studentsBody">
      <tr><td colspan="3">Loading...</td></tr>
    </tbody>

  </table>

  <button class="btn" onclick="saveMarks()">Save Marks</button>

</div>

<script>

// LOGOUT
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

// LOAD ONLY CURRENT TEACHER ASSIGNMENTS

        async function loadAssignments(){

    const res = await fetch(
`/.netlify/functions/getTeacher?school=${currentUser.school}`
    );

    const data = await res.json();

    if(!res.ok){
        alert(data.message);
        return;
    }

    const teacher = data.find(t =>
        t.username === currentUser.username
    );

    if(!teacher){
        alert("Teacher not found");
        return;
    }

    const select =
    document.getElementById("assignmentSelect");

    select.innerHTML = "";

    // ADD ASSIGNMENTS
    teacher.assignments.forEach(a => {

        select.innerHTML += `
        <option value="${a.class_name}|${a.subject}">
            ${a.class_name} - ${a.subject}
        </option>
        `;
    });

    // SHOW TEACHER NAME + SCHOOL
    document.getElementById("teacherName").innerText =
    teacher.full_name || teacher.username;

    document.getElementById("teacherSchool").innerText =
    teacher.school;

    // ONE ASSIGNMENT
    if(teacher.assignments.length === 1){

        const a = teacher.assignments[0];

        document.getElementById("teacherClass").innerText =
        a.class_name;

        document.getElementById("teacherSubject").innerText =
        a.subject;

        // HIDE DROPDOWN
        document.getElementById("assignmentBox")
        .style.display = "none";

        loadStudents();
    }

    // MANY ASSIGNMENTS
    else{

        document.getElementById("assignmentBox")
        .style.display = "block";

        select.selectedIndex = 0;

        changeAssignment();
    }
        }
// LOAD STUDENTS BASED ON SELECTION
// LOAD STUDENTS + EXISTING MARKS
async function loadStudents(){

    const value = document.getElementById("assignmentSelect").value;

    if(!value) return;

    const [class_name, subject] = value.split("|");

    const url =
`/.netlify/functions/getMarks?school=${currentUser.school}&class_name=${class_name}&subject=${subject}`;

    const res = await fetch(url);
    const data = await res.json();

    const body = document.getElementById("studentsBody");
    body.innerHTML = "";

    if(!res.ok){
        body.innerHTML =
        `<tr><td colspan="3">${data.message}</td></tr>`;
        return;
    }

    if(data.length === 0){
        body.innerHTML =
        `<tr><td colspan="3">No students found</td></tr>`;
        return;
    }

    data.forEach((s, index) => {

        body.innerHTML += `
        <tr>
            <td>${index + 1}</td>

            <td>${s.student_name}</td>

            <td>
                <input
                    type="number"
                    min="0"
                    max="100"
                    id="mark_${s.id}"
                    value="${s.mark ?? ''}"
                >
            </td>
        </tr>`;
    });
}
  function changeAssignment(){

    const value =
    document.getElementById("assignmentSelect").value;

    if(!value) return;

    const [class_name, subject] =
    value.split("|");

    document.getElementById("teacherClass").innerText =
    class_name;

    document.getElementById("teacherSubject").innerText =
    subject;

    loadStudents();
  }

// SAVE MARKS
async function saveMarks(){

    const value = document.getElementById("assignmentSelect").value;

    if(!value){
        alert("Select class and subject first");
        return;
    }

    const [class_name, subject] = value.split("|");

    const inputs = document.querySelectorAll("input[type='number']");
    let marks = [];

    inputs.forEach(input => {
        const student_id = input.id.split("_")[1];

        marks.push({
            student_id,
            mark: Number(input.value),
            subject
        });
    });

    const res = await fetch("/.netlify/functions/saveMarks", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
    marks,
    school: currentUser.school,
    class_name,
    subject
})
    });

    const result = await res.json();

    if(!res.ok){
        alert(result.message);
        return;
    }

    alert("Marks saved successfully");
}

// INIT
loadAssignments();

</script>

</body>
</html>
