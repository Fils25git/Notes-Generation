<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sector Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= MODAL ================= */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:450px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* ================= CARDS ================= */
.dashboard-card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.dashboard-card:hover{
transform:scale(1.03);
}

.cards-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

/* ================= BUTTONS ================= */
.btn{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.primary{background:#2563eb;color:white;}
.danger{background:#ef4444;color:white;}
.success{background:#16a34a;color:white;}

</style>

</head>

<body>

<script>
const role = localStorage.getItem("role");

if(role !== "sector_admin"){
alert("Access denied");
location.href="index.html";
}
</script>

<header style="text-align:center;padding:20px;background:#1d4ed8;color:white;">
<h2>SECTOR ADMIN DASHBOARD</h2>
</header>

<div class="cards-grid">

<!-- KEEP ALL YOUR ORIGINAL CARDS -->

<div class="dashboard-card" onclick="location.href='school-admins.html'">
<h3>School Admins</h3>
</div>

<div class="dashboard-card" onclick="location.href='view-schools.html'">
<h3>View Schools</h3>
</div>

<div class="dashboard-card" onclick="location.href='view-all.html'">
<h3>Sector Data</h3>
</div>

<!-- ================= TEST SYSTEM ================= -->

<div class="dashboard-card" onclick="openTestModal()">
<h3>Add New Test</h3>
<p>Create new exam session</p>
</div>

<div class="dashboard-card" onclick="openManageModal()">
<h3>Manage Tests</h3>
<p>Switch active test</p>
</div>

</div>

<!-- ================= ADD TEST MODAL ================= -->

<div id="testModal" class="modal">
<div class="modal-content">

<h3>Create New Test</h3>

<input id="testName"
placeholder="e.g MID TERM 1"
style="width:100%;padding:10px;margin-top:10px">

<br><br>

<button class="btn primary" onclick="createTest()">Create</button>
<button class="btn danger" onclick="closeTestModal()">Cancel</button>

</div>
</div>

<!-- ================= MANAGE TEST MODAL ================= -->

<div id="manageModal" class="modal">
<div class="modal-content">

<h3>Manage Tests</h3>

<div id="testList">Loading...</div>

<br>

<button class="btn danger" onclick="closeManage()">Close</button>

</div>
</div>

<script>

// ================= MODALS =================
function openTestModal(){
document.getElementById("testModal").style.display="flex";
}

function closeTestModal(){
document.getElementById("testModal").style.display="none";
}

function openManageModal(){
document.getElementById("manageModal").style.display="flex";
loadTests();
}

function closeManage(){
document.getElementById("manageModal").style.display="none";
}

// ================= CREATE TEST =================
async function createTest(){

const name = document.getElementById("testName").value.trim();
const user = JSON.parse(localStorage.getItem("currentUser")||"{}");

if(!name){
alert("Enter test name");
return;
}

if(!confirm(`Create "${name}" as NEW ACTIVE TEST?`)) return;

const res = await fetch("/.netlify/functions/createTest",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
test_name:name,
created_by:user.id,
role:"sector_admin",
school_name:null
})
});

const data = await res.json();

if(!res.ok){
alert(data.message || "Failed");
return;
}

const testId = data.id || data.test?.id;

localStorage.setItem("selectedTest", testId);

alert("Test created & activated");

document.getElementById("testName").value="";
closeTestModal();
}

// ================= LOAD TESTS =================
async function loadTests(){

const res = await fetch("/.netlify/functions/getTests");
const data = await res.json();

const box = document.getElementById("testList");
box.innerHTML = "";

if(!data.length){
box.innerHTML = "No tests found";
return;
}

data.forEach(t=>{

box.innerHTML += `
<div style="padding:10px;border-bottom:1px solid #eee">

<b>${t.test_name}</b><br>
<small>${new Date(t.created_at).toLocaleString()}</small><br><br>

<button class="btn primary"
onclick="activateTest(${t.id})">
Activate
</button>

</div>
`;

});

}

// ================= ACTIVATE TEST =================
async function activateTest(id){

localStorage.setItem("selectedTest", id);

alert("Test activated");

closeManage();

}

// ================= LOGOUT =================
function logout(){
localStorage.clear();
location.href="index.html";
}

</script>

</body>
</html>
