<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sector Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= MODAL ================= */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:450px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.modal-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.save-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.cancel-btn{
background:#ef4444;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

/* ================= DASHBOARD ================= */

.dashboard-card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.dashboard-card:hover{
transform:scale(1.03);
}

.cards-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.top-header{
text-align:center;
margin-bottom:20px;
}

.logout-btn{
background:#ef4444;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin:10px;
}

</style>

</head>

<body>

<script>
const role = localStorage.getItem("role");

if(role !== "sector_admin"){
alert("Access denied");
location.href="index.html";
}
</script>

<!-- ================= HEADER ================= -->
<div class="landing-container">

<header class="top-header">
<h1>SECTOR ADMIN DASHBOARD</h1>
<p>Manage schools, tests and results</p>
</header>

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="cards-grid">

<!-- SCHOOL ADMINS -->
<div class="dashboard-card"
onclick="location.href='school-admins.html'">
<h2>School Admins</h2>
<p>Create and manage school admins</p>
</div>

<!-- VIEW SCHOOLS -->
<div class="dashboard-card"
onclick="location.href='view-schools.html'">
<h2>View Schools</h2>
<p>Performance ranking</p>
</div>

<!-- SECTOR DATA -->
<div class="dashboard-card"
onclick="location.href='view-all.html'">
<h2>Sector Data</h2>
<p>All schools & students</p>
</div>

<!-- ADD TEST -->
<div class="dashboard-card"
onclick="openTestModal()">
<h2>Add New Test</h2>
<p>Create new exam session</p>
</div>

<!-- MANAGE TESTS -->
<div class="dashboard-card"
onclick="openManageModal()">
<h2>Manage Tests</h2>
<p>Switch between exams</p>
</div>

</div>
</div>

<!-- ================= CREATE TEST MODAL ================= -->

<div id="testModal" class="modal">
<div class="modal-content">

<h2>Create New Test</h2>

<input type="text" id="testName" placeholder="e.g MID TERM 1">

<div class="modal-buttons">
<button class="save-btn" onclick="createTest()">Create</button>
<button class="cancel-btn" onclick="closeTestModal()">Cancel</button>
</div>

</div>
</div>

<!-- ================= MANAGE TESTS MODAL ================= -->

<div id="manageModal" class="modal">
<div class="modal-content">

<h2>Manage Tests</h2>

<div id="testsList">Loading...</div>

<div class="modal-buttons">
<button class="cancel-btn" onclick="closeManageModal()">Close</button>
</div>

</div>
</div>

<script>

// ================= LOGOUT =================
function logout(){
localStorage.clear();
location.href="index.html";
}

// ================= MODAL CONTROL =================
function openTestModal(){
document.getElementById("testModal").style.display="flex";
}

function closeTestModal(){
document.getElementById("testModal").style.display="none";
}

function openManageModal(){
document.getElementById("manageModal").style.display="flex";
loadTests();
}

function closeManageModal(){
document.getElementById("manageModal").style.display="none";
}

// ================= CREATE TEST =================
async function createTest(){

const name = document.getElementById("testName").value.trim();
const user = JSON.parse(localStorage.getItem("currentUser")||"{}");

if(!name){
alert("Enter test name");
return;
}

const ok = confirm(`Create "${name}" as NEW ACTIVE TEST?`);
if(!ok) return;

const res = await fetch("/.netlify/functions/createTest",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
test_name:name,
created_by:user.id,
role:"sector_admin",
school_name:null,
is_active:true
})
});

const data = await res.json();

if(!res.ok){
alert(data.message || "Failed");
return;
}

// SAFE ID HANDLING
const newId = data.id || data.test?.id;

if(!newId){
alert("Test created but ID missing");
return;
}

localStorage.setItem("selectedTest", newId);

alert("Test created and activated");

document.getElementById("testName").value="";
closeTestModal();
}

// ================= LOAD TESTS =================
async function loadTests(){

const res = await fetch("/.netlify/functions/getTests");
const data = await res.json();

const box = document.getElementById("testsList");
box.innerHTML = "";

if(!Array.isArray(data) || data.length === 0){
box.innerHTML = "No tests found";
return;
}

data.forEach(t => {

box.innerHTML += `
<div style="padding:10px;border-bottom:1px solid #eee">

<b>${t.test_name}</b><br>

<small>
Created: ${t.created_at ? new Date(t.created_at).toLocaleString() : "N/A"}
</small><br>

<button class="save-btn"
style="margin-top:8px;"
onclick="activateTest(${t.id})">
Set Active
</button>

</div>
`;

});

}

// ================= ACTIVATE TEST =================
async function activateTest(id){

if(!id){
alert("Invalid test ID");
return;
}

const res = await fetch("/.netlify/functions/activateTest",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
});

if(res.ok){

localStorage.setItem("selectedTest", id);

alert("Test activated");

loadTests();

}else{
alert("Failed to activate test");
}

}

</script>

</body>
    </html>
