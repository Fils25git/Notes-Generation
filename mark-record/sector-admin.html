<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sector Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= MODAL BASE ================= */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
}

/* stack modal (second level) */
.modal.secondary{
z-index:1000;
}

.modal-content{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.btn{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.primary{background:#2563eb;color:white;}
.danger{background:#ef4444;color:white;}
.success{background:#16a34a;color:white;}
.gray{background:#e5e7eb;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
font-size:14px;
}

th{background:#1d4ed8;color:white;}

.small{
font-size:12px;
color:gray;
}

.card{
padding:15px;
background:white;
border-radius:10px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<script>
const role = localStorage.getItem("role");

if(role !== "sector_admin"){
alert("Access denied");
location.href="index.html";
}
</script>

<!-- ================= HEADER ================= -->
<header style="text-align:center;padding:20px;background:#1d4ed8;color:white;">
<h2>SECTOR ADMIN DASHBOARD</h2>
</header>

<div style="padding:20px;">

<!-- ================= MANAGE TESTS CARD ================= -->
<div class="card" onclick="openTestsModal()">
<h3>Manage Tests</h3>
<p>View, switch and create tests for all schools</p>
</div>

</div>

<!-- ===================================================== -->
<!-- MODAL 1: TEST LIST + SWITCH -->
<!-- ===================================================== -->

<div id="testsModal" class="modal">
<div class="modal-content">

<h3>Manage Tests</h3>

<button class="btn success" onclick="openCreateTestModal()">
+ Add New Test
</button>

<div id="testsList" style="margin-top:15px;">
Loading tests...
</div>

<br>

<button class="btn danger" onclick="closeTestsModal()">Close</button>

</div>
</div>

<!-- ===================================================== -->
<!-- MODAL 2: CREATE TEST (OVERLAY) -->
<!-- ===================================================== -->

<div id="createTestModal" class="modal secondary">
<div class="modal-content">

<h3>Create New Test</h3>

<input id="testName"
placeholder="Enter test name"
style="width:100%;padding:10px;margin-top:10px;border:1px solid #ccc;border-radius:8px;">

<br><br>

<button class="btn primary" onclick="createTest()">Create</button>
<button class="btn danger" onclick="closeCreateTestModal()">Cancel</button>

</div>
</div>

<script>

// ================= STATE =================
let testsCache = [];

// ================= OPEN TEST LIST =================
async function openTestsModal(){
document.getElementById("testsModal").style.display="flex";
await loadTests();
}

// ================= CLOSE =================
function closeTestsModal(){
document.getElementById("testsModal").style.display="none";
}

// ================= OPEN CREATE =================
function openCreateTestModal(){
document.getElementById("createTestModal").style.display="flex";
}

// ================= CLOSE CREATE =================
function closeCreateTestModal(){
document.getElementById("createTestModal").style.display="none";
}

// ================= LOAD TESTS =================
async function loadTests(){

const res = await fetch("/.netlify/functions/getTests");
const data = await res.json();

testsCache = data;

const box = document.getElementById("testsList");

if(!data.length){
box.innerHTML = "No tests found";
return;
}

box.innerHTML = `
<table>
<tr>
<th>Test</th>
<th>Created</th>
<th>Action</th>
</tr>

${data.map(t=>`
<tr>
<td>${t.test_name}</td>
<td class="small">${new Date(t.created_at).toLocaleString()}</td>
<td>
<button class="btn primary"
onclick="switchTest('${t.id}')">
Switch
</button>
</td>
</tr>
`).join("")}

</table>
`;

}

// ================= SWITCH TEST =================
async function switchTest(id){

localStorage.setItem("selectedTest", id);

alert("Test switched successfully");

closeTestsModal();

}

// ================= CREATE TEST =================
async function createTest(){

const name = document.getElementById("testName").value.trim();

if(!name){
alert("Enter test name");
return;
}

const ok = confirm(`Create "${name}" as new test?`);
if(!ok) return;

const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");

const res = await fetch("/.netlify/functions/createTest",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
test_name:name,
created_by:currentUser.id,
role:"sector_admin"
})
});

const data = await res.json();

if(!res.ok){
alert(data.message || "Failed");
return;
}

alert("Test created");

document.getElementById("testName").value="";

closeCreateTestModal();
await loadTests();

}

// ================= LOGOUT =================
function logout(){
localStorage.clear();
location.href="index.html";
}

</script>

</body>
    </html>
