<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================= LAYOUT ================= */

body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#f3f6fb;
}

header{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:95%;
    max-width:1000px;
    margin:20px auto;
}

/* ================= CARDS ================= */

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* ================= BUTTONS ================= */

.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.btn-danger{
    background:#ef4444;
}

/* ================= MODAL ================= */

.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:25px;
    border-radius:12px;
    width:90%;
    max-width:400px;
}

.modal-content input,
.modal-content select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

</style>

</head>

<body>

<script>

// ================= PROTECT =================

const role = localStorage.getItem("role");
const currentUser = JSON.parse(localStorage.getItem("currentUser") || "{}");

if(role !== "school_admin"){
    alert("Access denied");
    location.href="index.html";
}

</script>

<header>
<h1>SCHOOL ADMIN DASHBOARD</h1>
<p id="schoolInfo"></p>
</header>

<div class="container">

<!-- ================= ACTIVE TEST ================= -->

<div class="card">

<h2>Active Test</h2>

<p id="activeTest">Loading...</p>

<button class="btn" onclick="openTestModal()">
+ Create New Test
</button>

<button class="btn" onclick="loadTests()">
Switch Test
</button>

</div>

<!-- ================= ACTIONS ================= -->

<div class="card">

<h2>School Management</h2>

<button class="btn"
onclick="location.href='teachers.html'">
Manage Teachers
</button>

<button class="btn"
onclick="location.href='students.html'">
Manage Students
</button>

<button class="btn"
onclick="location.href='school-marks.html'">
View Results
</button>

</div>

</div>

<!-- ================= CREATE TEST MODAL ================= -->

<div id="testModal" class="modal">

<div class="modal-content">

<h2>Create New Test</h2>

<input type="text"
id="testName"
placeholder="Enter test name">

<div style="display:flex;gap:10px;margin-top:15px;">

<button class="btn"
onclick="createTest()">
Create
</button>

<button class="btn btn-danger"
onclick="closeTestModal()">
Cancel
</button>

</div>

</div>

</div>

<!-- ================= SWITCH TEST MODAL ================= -->

<div id="switchModal" class="modal">

<div class="modal-content">

<h2>Switch Test</h2>

<div id="testList">Loading...</div>

<button class="btn btn-danger"
onclick="closeSwitchModal()">
Close
</button>

</div>

</div>

<script>

// ================= INIT =================

document.getElementById("schoolInfo").innerText =
"School: " + currentUser.school;

// ================= ACTIVE TEST =================

async function loadActiveTest(){

const res = await fetch("/.netlify/functions/getTests");
const tests = await res.json();

const active = tests.find(t => t.is_active);

document.getElementById("activeTest").innerText =
active ? active.test_name : "No active test";

}

// ================= CREATE TEST =================

async function createTest(){

const test_name =
document.getElementById("testName").value.trim();

if(!test_name){
    alert("Enter test name");
    return;
}

const ok = confirm(`Create "${test_name}"?`);
if(!ok) return;

const res = await fetch("/.netlify/functions/createTest",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
        test_name,
        role:"school_admin",
        school_name:currentUser.school,
        created_by:currentUser.id
    })
});

const data = await res.json();

if(!res.ok){
    alert(data.message);
    return;
}

localStorage.setItem("selectedTest", data.id);

alert("Test created & activated");

closeTestModal();
loadActiveTest();

}

// ================= LOAD TESTS =================

async function loadTests(){

const res = await fetch("/.netlify/functions/getTests");
const tests = await res.json();

const box = document.getElementById("testList");
box.innerHTML = "";

tests.forEach(t => {

box.innerHTML += `
<div class="card">

<b>${t.test_name}</b><br>
<small>${t.created_at}</small><br><br>

<button class="btn"
onclick="activateTest('${t.id}')">
Switch
</button>

</div>
`;

});

document.getElementById("switchModal").style.display="flex";

}

// ================= ACTIVATE TEST =================

async function activateTest(id){

const res = await fetch("/.netlify/functions/activateTest",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id})
});

const data = await res.json();

if(res.ok){

localStorage.setItem("selectedTest", id);

alert("Test switched");

closeSwitchModal();
loadActiveTest();

}

}

// ================= MODALS =================

function openTestModal(){
document.getElementById("testModal").style.display="flex";
}

function closeTestModal(){
document.getElementById("testModal").style.display="none";
}

function closeSwitchModal(){
document.getElementById("switchModal").style.display="none";
}

// ================= LOAD INIT =================

loadActiveTest();

</script>

</body>
  </html>
