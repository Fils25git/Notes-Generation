<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sector Education System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>LOGIN TO SYSTEM</h1>
    <p>Sector Education Examination Platform</p>
</header>

<main class="dashboard-container">
    <div class="card">
        <h2>User Login</h2>

        <label>Username</label>
        <input type="text" id="username">

        <label>Password</label>
        <input type="password" id="password">

        <button class="btn" onclick="loginUser()">Login</button>

        <p style="margin-top:15px;">
            First time? <a href="signup.html">Create Sector Admin</a>
        </p>
    </div>
</main>

<script>
async function loginUser(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!username || !password){
        alert("Please enter username and password");
        return;
    }

    const response = await fetch("/.netlify/functions/loginUser", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    });

    const result = await response.json();

    if(!response.ok){
        alert(result.message);
        return;
    }

    // ONLY SESSION STORAGE NOW
    localStorage.setItem("role", result.role);
    localStorage.setItem("currentUser", JSON.stringify(result));

    alert("Login successful");

    if(result.role === "sector_admin"){
        window.location.href = "dashboard.html";
    }

    if(result.role === "school_admin"){
        window.location.href = "dashboard.html";
    }

    if(result.role === "teacher"){
        window.location.href = "students.html";
    }
}
</script>

</body>
</html>
