<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sector Education System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>LOGIN TO SYSTEM</h1>
    <p>Sector Education Examination Platform</p>
</header>

<main class="dashboard-container">

    <div class="card">

        <h2 style="margin-bottom:25px;">User Login</h2>

        <label>Username</label>
        <input 
            type="text" 
            id="username"
            placeholder="Enter username"
        >

        <label>Password</label>
        <input 
            type="password" 
            id="password"
            placeholder="Enter password"
        >

        <button 
            class="btn"
            id="loginBtn"
            onclick="loginUser()"
        >
            Login
        </button>

        <p style="margin-top:20px;text-align:center;">
            First time?
            <a href="signup.html">
                Create Sector Admin
            </a>
        </p>

    </div>

</main>

<script>

// IF USER ALREADY LOGGED IN
const existingRole = localStorage.getItem("role");

if(existingRole === "sector_admin"){
    window.location.href = "sector-admin.html";
}

if(existingRole === "school_admin"){
    window.location.href = "school-admin.html";
}

if(existingRole === "teacher"){
    window.location.href = "students.html";
}

// ENTER KEY SUPPORT
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        loginUser();
    }
});

async function loginUser(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");

    if(!username || !password){
        alert("Please enter username and password");
        return;
    }

    btn.innerText = "Logging in...";
    btn.disabled = true;

    try{

        const response = await fetch("/.netlify/functions/loginUser", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username,
                password
            })
        });

        const result = await response.json();

        if(!response.ok){
            alert(result.message);

            btn.innerText = "Login";
            btn.disabled = false;
            return;
        }

        // SAVE SESSION
        localStorage.setItem("role", result.role);
        localStorage.setItem("currentUser", JSON.stringify(result));

        // REDIRECT BY ROLE
        if(result.role === "sector_admin"){
            window.location.href = "sector-admin.html";
        }

        if(result.role === "school_admin"){
            window.location.href = "school-admin.html";
        }

        if(result.role === "teacher"){
            window.location.href = "students.html";
        }

    }catch(error){

        alert("Server error. Try again.");

        btn.innerText = "Login";
        btn.disabled = false;
    }
}
</script>

</body>
</html>
