<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chats with Teachers</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow px-4 py-3 flex items-center justify-between">
    <h1 class="text-xl font-semibold text-blue-700">Chats with Teachers</h1>
    <button id="refreshBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">Refresh</button>
  </header>

  <!-- Teachers list container -->
  <main class="flex-1 overflow-y-auto p-4 space-y-6">

  <!-- Chats -->
  <div>
    <h2 class="text-lg font-semibold text-gray-700 mb-3">Your Chats</h2>
    <div id="teachersContainer" class="space-y-3">
      <p id="loadingText" class="text-gray-500">Loading chats...</p>
    </div>
  </div>

  <!-- Suggestions -->
  <div>
    <h2 class="text-lg font-semibold text-gray-700 mb-3">Suggested Teachers</h2>
    <div id="suggestedContainer" class="space-y-3">
      <p class="text-gray-400">Loading suggestions...</p>
    </div>
  </div>

  </main>

  <script>
    // Ensure we have our logged-in userId
// Get elements
const teachersContainer = document.getElementById("teachersContainer");
const loadingText = document.getElementById("loadingText");
const refreshBtn = document.getElementById("refreshBtn");

// Your loadChats function stays the same
    async function loadChats() {
  teachersContainer.innerHTML = '';
  loadingText.textContent = "Loading chats...";
  teachersContainer.appendChild(loadingText);

  const token = localStorage.getItem("auth_token");

  try {
    const res = await fetch(`/.netlify/functions/get-chats`, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();
    loadingText.remove();

    if (!data.teachers || data.teachers.length === 0) {
      teachersContainer.innerHTML =
        '<p class="text-gray-500">No chats found yet.</p>';
      return;
    }

    // ✅ Sort by latest time (extra safety)
    data.teachers.sort((a, b) =>
      new Date(b.last_message_at) - new Date(a.last_message_at)
    );

    data.teachers.forEach(t => {
      const card = document.createElement("div");
      card.className =
        "bg-white p-4 rounded shadow hover:shadow-md transition cursor-pointer flex justify-between items-center";

      const info = document.createElement("div");

      const isUnread = t.unread_count > 0;

      info.innerHTML = `
        <p class="font-semibold ${isUnread ? 'text-blue-900 font-bold' : 'text-blue-700'}">
          ${t.name}
        </p>
        <p class="text-gray-500 text-sm">
          ${t.sender_id == myId ? "You: " : ""}
          ${t.last_message ? t.last_message.slice(0,50) : 'No messages yet...'}
        </p>
      `;

      const rightSide = document.createElement("div");
      rightSide.className = "flex flex-col items-end gap-1";

      // Time
      const time = document.createElement("span");
      time.className = "text-gray-400 text-xs";

      if (t.last_message_at) {
        const date = new Date(t.last_message_at);
        time.textContent = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      rightSide.appendChild(time);

      // ✅ Unread badge
      if (isUnread) {
        const badge = document.createElement("span");
        badge.className =
          "bg-blue-600 text-white text-xs px-2 py-1 rounded-full";
        badge.textContent = t.unread_count;
        rightSide.appendChild(badge);
      }

      card.appendChild(info);
      card.appendChild(rightSide);

      card.addEventListener("click", () => {
        localStorage.setItem("chatReceiverId", t.auth_user_id);
        localStorage.setItem("chatReceiverName", t.name);
        window.location.href = "chat.html";
      });

      teachersContainer.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    teachersContainer.innerHTML =
      '<p class="text-red-500">Failed to load chats.</p>';
  }
  }

    async function loadSuggestions() {
  const suggestedContainer = document.getElementById("suggestedContainer");
  const token = localStorage.getItem("auth_token");

  try {
    const res = await fetch(`/.netlify/functions/get-suggested-teachers`, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();
    suggestedContainer.innerHTML = "";

    if (!data.teachers || data.teachers.length === 0) {
      suggestedContainer.innerHTML = '<p class="text-gray-400">No suggestions available.</p>';
      return;
    }

    data.teachers.forEach(t => {
      const card = document.createElement("div");
      card.className = "bg-white p-4 rounded shadow hover:shadow-md transition cursor-pointer";

      card.innerHTML = `
        <p class="font-semibold text-blue-700">${t.full_name}</p>
        <p class="text-gray-500 text-sm">${t.position}</p>
        <p class="text-gray-500 text-sm">${t.current_school} - ${t.current_district}/${t.current_sector} </p>
        <p class="text-gray-500 text-sm"> Tap to message</p>
      `;

      card.addEventListener("click", () => {
        localStorage.setItem("chatReceiverId", t.auth_user_id);
        localStorage.setItem("chatReceiverName", t.full_name);
        window.location.href = "chat.html";
      });

      suggestedContainer.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    suggestedContainer.innerHTML = '<p class="text-red-500">Failed to load suggestions.</p>';
  }
      }

// ---------- Ensure userId exists ----------
let myId = localStorage.getItem("userId");

if (!myId) {
  const token = localStorage.getItem("auth_token");
  if (token) {
    fetch("/.netlify/functions/getTeacherProfile", {
      headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.json())
    .then(data => {
      myId = data.profile.auth_user_id;
      localStorage.setItem("userId", myId);
      // Load chats after userId is ready
      loadChats();
    })
    .catch(err => {
      console.error("Failed to fetch profile:", err);
      teachersContainer.innerHTML = '<p class="text-red-500">Cannot load chats. Try logging in again.</p>';
    });
  } else {
    teachersContainer.innerHTML = '<p class="text-red-500">Not logged in.</p>';
  }
} else {
  // userId already exists
  loadChats();
loadSuggestions();
}

// Refresh button
refreshBtn.addEventListener("click", () => {
  loadChats();
  loadSuggestions();
});
    </script>

</body>
</html>
