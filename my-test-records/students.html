<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Students</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="dashboard-wrapper">

<!-- SIDEBAR -->
<aside class="sidebar">
<div class="sidebar-logo">
<h2>Marks System</h2>
</div>

<div class="sidebar-menu">
<a href="dashboard.html" class="sidebar-link">
<i class="fa-solid fa-house"></i> Dashboard
</a>

<a href="students.html" class="sidebar-link active">
<i class="fa-solid fa-users"></i> Manage Students
</a>

<a href="marks.html" class="sidebar-link">
<i class="fa-solid fa-pen"></i> Record Marks
</a>

<a href="results.html" class="sidebar-link">
<i class="fa-solid fa-chart-column"></i> Results
</a>

<a href="login.html" class="sidebar-link">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</div>
</aside>

<!-- MAIN -->
<main class="main-content">

<div class="topbar">

<div class="teacher-info">
<h2>Manage Students</h2>
<p>All data loaded from database</p>
</div>

<button class="btn btn-primary" onclick="openModal()">
<i class="fa-solid fa-plus"></i> Add Student
</button>

</div>

<!-- CLASSES FROM DB -->
<div id="classContainer" class="class-selector"></div>

<!-- CARD -->
<div class="card">

<h2>Students List</h2>

<div class="student-search">
<input type="text" id="searchInput" placeholder="Search student...">
</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Gender</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="studentsTable"></tbody>

</table>

</div>

</div>

</main>

</div>

<!-- MODAL -->
<div class="modal" id="studentModal">

<div class="modal-content">

<h2>Add Student</h2>

<form id="addStudentForm">

<div class="input-group">
<label>Name</label>
<input id="name" required>
</div>

<div class="input-group">
<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>


<div class="input-group">
<label>Class</label>
<select id="classSelect"></select>
</div>

<div style="display:flex;gap:10px;margin-top:20px;">
<button type="button" class="btn btn-danger" onclick="closeModal()">Cancel</button>
<button class="btn btn-primary">Save</button>
</div>

</form>

</div>

</div>

<script>

let selectedClass = null;

/* =========================
LOAD CLASSES FROM DB
========================= */
async function loadClasses(){

const res = await fetch("/.netlify/functions/get-Classes");
const data = await res.json();

const classContainer = document.getElementById("classContainer");
const classSelect = document.getElementById("classSelect");

classContainer.innerHTML = "";
classSelect.innerHTML = "";

data.forEach((c, index) => {

classContainer.innerHTML += `
<button class="class-btn ${index===0?'active':''}" 
onclick="selectClass(${c.id})">
${c.class_name}
</button>
`;

classSelect.innerHTML += `
<option value="${c.id}">${c.class_name}</option>
`;

});

selectedClass = data[0]?.id;
loadStudents();

}

/* =========================
SELECT CLASS
========================= */
function selectClass(id){

selectedClass = id;
loadStudents();

document.querySelectorAll(".class-btn")
.forEach(btn => btn.classList.remove("active"));

event.target.classList.add("active");

}

/* =========================
LOAD STUDENTS FROM DB
========================= */
async function loadStudents(){

const res = await fetch(`/.netlify/functions/get-Students?class_id=${selectedClass}`);
const data = await res.json();

const table = document.getElementById("studentsTable");
table.innerHTML = "";

data.forEach((s,i)=>{

table.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${s.full_name}</td>
<td>${s.gender}</td>
<td class="action-cell">

<button
class="action-btn edit-btn"
onclick="
editStudent(
${s.id},
'${s.full_name}',
'${s.gender}',
${s.class_id}
)
"
>

<i class="fa-solid fa-pen"></i>

</button>

<button
class="action-btn delete-btn"
onclick="
deleteStudent(
${s.id}
)
"
>

<i class="fa-solid fa-trash"></i>

</button>

</td>
</tr>
`;

});

}
    /* =========================
EDIT STUDENT
========================= */

async function editStudent(
id,
name,
gender,
class_id
){

const full_name=
prompt(
"Edit student name",
name
);

if(!full_name)return;

const body={

id,
full_name,
gender,
class_id

};

await fetch(
"/.netlify/functions/update-Student",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(body)

}
);

loadStudents();

}



/* =========================
DELETE STUDENT
========================= */

async function deleteStudent(id){

const yes=
confirm(
"Delete this student?"
);

if(!yes)return;

await fetch(
"/.netlify/functions/delete-Student",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id
})

}
);

loadStudents();

    }

/* =========================
ADD STUDENT (DB)
========================= */
document.getElementById("addStudentForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const classValue = document.getElementById("classSelect").value;

    if (!classValue) {
        alert("Please select class");
        return;
    }

    const body = {
        full_name: document.getElementById("name").value,
        gender: document.getElementById("gender").value,
        class_id: classValue
    };

    try {

        const res = await fetch("/.netlify/functions/add-Student", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
            alert("Error: " + data.error);
            return;
        }

        alert("Student added successfully!");

        closeModal();
        loadStudents();

    } catch (error) {
        alert("Network error");
        console.log(error);
    }

});
/* =========================
MODAL
========================= */
function openModal(){
document.getElementById("studentModal").classList.add("active");
}

function closeModal(){
document.getElementById("studentModal").classList.remove("active");
}

/* =========================
INIT
========================= */
loadClasses();

</script>

</body>
    <style>
        .action-cell{

display:flex;
gap:6px;
justify-content:center;

}

.action-btn{

width:35px;
height:35px;

border:none;
border-radius:8px;

cursor:pointer;

font-size:14px;

}

.edit-btn{

background:#28a745;
color:white;

}

.delete-btn{

background:#dc3545;
color:white;

}
    </style>
    </html>
