<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Record Marks</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/marks.css">
<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="dashboard-wrapper">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="sidebar-logo">

<h2>Marks System</h2>

</div>


<div class="sidebar-menu">

<a href="dashboard.html"
class="sidebar-link">

<i class="fa-solid fa-house"></i>

Dashboard

</a>


<a href="students.html"
class="sidebar-link">

<i class="fa-solid fa-users"></i>

Manage Students

</a>


<a href="marks.html"
class="sidebar-link active">

<i class="fa-solid fa-pen"></i>

Record Marks

</a>


<a href="results.html"
class="sidebar-link">

<i class="fa-solid fa-chart-column"></i>

Results

</a>


<a href="login.html"
class="sidebar-link">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

</aside>



<!-- MAIN CONTENT -->

<main class="main-content">

<div class="topbar">

<div class="teacher-info">

<h2>Record Marks</h2>

<p>

Record tests and exams

</p>

</div>


<div class="marks-actions">

<button
class="btn btn-primary"
onclick="openTestModal()">

<i class="fa-solid fa-plus"></i>

Add Test

</button>

</div>

</div>



<!-- SUBJECTS -->

<div
id="subjectContainer"
class="subject-selector">

</div>



<!-- CLASSES -->

<div
id="classContainer"
class="class-selector">

</div>



<!-- TERMS -->

<div
id="termContainer"
class="class-selector">

</div>



<!-- SEARCH -->

<div class="student-search">

<input
type="text"
id="searchInput"
placeholder="Search learner..."
onkeyup="searchLearners()">

</div>



<!-- SAVE STATUS -->

<div
id="saveStatus"

style="
padding:10px;
font-weight:bold;
color:green;
">

</div>




<!-- DEBUG -->

<div
id="debugBox"

style="

background:black;
color:lime;
padding:10px;
margin:10px;
font-size:12px;
height:150px;
overflow:auto;
white-space:pre-wrap;

">

Debug logs...

</div>




<!-- TABLE -->

<div class="card">

<div class="table-container">

<table class="marks-table">

<thead>

<tr id="marksHeader">

<th>#</th>

<th>Pupil Name</th>

<!-- TESTS WILL COME FROM DATABASE -->

<th>Total Tests/{{examMax}}</th>

<th>Overall Test</th>

<th>Exam</th>

<th>Overall Exam</th>

<th>Total Marks</th>

<th>Percentage</th>

</tr>

</thead>


<tbody id="marksTable">

</tbody>

</table>

</div>

</div>

</main>

</div>




<!-- ADD TEST MODAL -->

<div
class="modal"
id="testModal">

<div class="modal-content">

<h2>

Add New Test

</h2>



<div class="input-group">

<label>

Test Name

</label>

<input
id="testName"
type="text"
placeholder="Example: Test 1">

</div>




<div class="input-group">

<label>

Out Of

</label>

<input
id="testMax"
type="number"
placeholder="Maximum score">

</div>




<div
style="
margin-top:15px;
">

<label>

<input
id="isExam"
type="checkbox">

Is Exam

</label>

</div>




<div
style="
display:flex;
gap:10px;
margin-top:20px;
">

<button
class="btn btn-danger"
onclick="closeTestModal()">

Cancel

</button>


<button
class="btn btn-primary"
onclick="addTest()">

Add Test

</button>

</div>

</div>

</div>



<script src="js/marks.js"></script>

</body>
  </html>
