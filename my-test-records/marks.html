<body>

<!-- MAIN -->

<!-- SEARCH -->
<div class="student-search">

</div>
    <div id="debugBox" style="
background:black;
color:lime;
padding:10px;
margin:10px;
font-size:12px;
height:200px;
overflow:auto;
white-space:pre-wrap;">
Debug logs...
    </div>

<!-- TABLE -->
<div class="card">
<div class="table-container">

<table class="marks-table">

<thead>
<tr>
<th>#</th>

<th>Test/..</th>

</tr>
</thead>

</table>

</main>

<!-- MODAL -->

    <script>

const teacher = JSON.parse(
localStorage.getItem("teacher") || "{}"
);

let selectedSubject = null;
let selectedClass = null;
let selectedTerm = null;
let selectedYear = null;


// =========================
// DEBUG
// =========================

function debug(message){

console.log(message);

const box =
document.getElementById(
"debugBox"
);

if(box){

box.innerHTML +=
message + "<br>";

box.scrollTop =
box.scrollHeight;

}

}


// =========================
// API WRAPPER
// =========================

async function school(
action,
body={},
method="GET"
){

try{

let url =
`/.netlify/functions/school?action=${action}`;

const options = {
method,
headers:{
"Content-Type":"application/json"
}
};

if(method==="GET"){

const params =
new URLSearchParams(
body
).toString();

if(params){

url += `&${params}`;

}

}
else{

options.body =
JSON.stringify(body);

}

debug(
"REQUEST: " + url
);

const res =
await fetch(
url,
options
);

const data =
await res.json();

debug(
"API " +
action +
": " +
JSON.stringify(data)
);

return data;

}
catch(err){

debug(
"API ERROR: " +
err.message
);

return [];

}

}


// =========================
// LOAD ACADEMIC
// =========================

async function loadAcademicContext(){

try{

const res =
await fetch(
"/.netlify/functions/academic?action=getCurrent"
);

const data =
await res.json();

selectedYear =
data?.year?.id;

selectedTerm =
data?.term?.id;

debug(
"Academic Year: " +
selectedYear
);

debug(
"Term: " +
selectedTerm
);

}
catch(err){

debug(
"Academic error: " +
err.message
);

}

}


// =========================
// LOAD TERMS
// =========================

async function loadTerms(){

const data =
await fetch(
"/.netlify/functions/academic?action=getTerms"
)
.then(
r=>r.json()
);

if(
!Array.isArray(data)
||
!data.length
){

debug(
"No terms"
);

return;

}

const container =
document.getElementById(
"termContainer"
);

container.innerHTML="";

data.forEach(
(term,i)=>{

container.innerHTML += `

<button
class="class-btn ${i===0?"active":""}"
onclick="selectTerm(${term.id},event)"
>

${term.term_name}

</button>

`;

});

selectedTerm =
selectedTerm ||
data[0].id;

}


// =========================
// SELECT TERM
// =========================

function selectTerm(
id,
event
){

selectedTerm=id;

document
.querySelectorAll(
"#termContainer button"
)
.forEach(
b=>
b.classList.remove(
"active"
)
);

event.target
.classList.add(
"active"
);

loadMarks();

}


// =========================
// LOAD SUBJECTS
// =========================

async function loadSubjects(){

const data =
await school(
"getSubjects"
);

if(
!Array.isArray(data)
||
!data.length
){

debug(
"No subjects"
);

return;

}

const container =
document.getElementById(
"subjectContainer"
);

container.innerHTML="";

data.forEach(
(subject,i)=>{

container.innerHTML += `

<button
class="subject-btn ${i===0?"active":""}"
onclick="selectSubject(${subject.id},event)"
>

${subject.subject_name}

</button>

`;

});

selectedSubject =
data[0].id;

}


// =========================
// SELECT SUBJECT
// =========================

function selectSubject(
id,
event
){

selectedSubject=id;

document
.querySelectorAll(
".subject-btn"
)
.forEach(
b=>
b.classList.remove(
"active"
)
);

event.target
.classList.add(
"active"
);

loadMarks();

}


// =========================
// LOAD CLASSES
// =========================

async function loadClasses(){

const data =
await school(
"getClasses"
);

if(
!Array.isArray(data)
||
!data.length
){

debug(
"No classes"
);

return;

}

const container =
document.getElementById(
"classContainer"
);

container.innerHTML="";

data.forEach(
(cls,i)=>{

container.innerHTML += `

<button
class="class-btn ${i===0?"active":""}"
onclick="selectClass(${cls.id},event)"
>

${cls.class_name}

</button>

`;

});

selectedClass =
data[0].id;

}


// =========================
// SELECT CLASS
// =========================

function selectClass(
id,
event
){

selectedClass=id;

document
.querySelectorAll(
".class-btn"
)
.forEach(
b=>
b.classList.remove(
"active"
)
);

event.target
.classList.add(
"active"
);

loadMarks();

}


// =========================
// LOAD MARKS
// =========================

async function loadMarks(){

debug(
"Loading marks..."
);

debug(
"Year: " +
selectedYear
);

debug(
"Term: " +
selectedTerm
);

debug(
"Class: " +
selectedClass
);

debug(
"Subject: " +
selectedSubject
);

if(
!selectedYear
||
!selectedTerm
||
!selectedClass
||
!selectedSubject
){

debug(
"Missing required values"
);

return;

}

const data =
await school(
"getMarks",
{
class_id:selectedClass,
subject_id:selectedSubject,
term_id:selectedTerm,
academic_year_id:selectedYear
}
);

const table =
document.getElementById(
"marksTable"
);

table.innerHTML="";

if(
!Array.isArray(data)
||
!data.length
){

debug(
"No learners returned"
);

table.innerHTML=`

<tr>
<td colspan="8">
No learners found
</td>
</tr>

`;

return;

}

debug(
"Learners: " +
data.length
);

data.forEach(
(learner,i)=>{

let total=0;

learner.marks.forEach(
mark=>{

total +=
Number(
mark.score || 0
);

}
);

table.innerHTML += `

<tr>

<td>${i+1}</td>

<td>${learner.full_name}</td>

${learner.marks.map(
mark=>`

<td>

<input
type="number"
value="${mark.score||''}"

onchange="
saveMark(
${learner.id},
${selectedSubject},
${selectedClass},
'${mark.assessment_type}',
this.value
)
">

</td>

`
).join("")}

<td>${total}</td>

</tr>

`;

});

}


// =========================
// SAVE MARK
// =========================

async function saveMark(
learner_id,
subject_id,
class_id,
assessment_type,
score
){

const response =
await school(
"saveMark",
{
learner_id,
subject_id,
class_id,
academic_year_id:selectedYear,
term_id:selectedTerm,
teacher_id:teacher.id,
assessment_type,
score,
max_score:100
},
"POST"
);

debug(
"Saved: " +
JSON.stringify(response)
);

}


// =========================
// MODAL
// =========================

function openTestModal(){

document
.getElementById(
"testModal"
)
.classList.add(
"active"
);

}

function closeTestModal(){

document
.getElementById(
"testModal"
)
.classList.remove(
"active"
);

}


// =========================
// INIT
// =========================

async function init(){

debug(
"Starting..."
);

await loadAcademicContext();

await loadTerms();

await loadSubjects();

await loadClasses();

await loadMarks();

}

init();

    </script>
</body>
