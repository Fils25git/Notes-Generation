<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Record Marks</title>

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/marks.css">
<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="dashboard-wrapper">

<aside class="sidebar">
<div class="sidebar-logo">
<h2>Marks System</h2>
</div>

<div class="sidebar-menu">

<a href="dashboard.html" class="sidebar-link">
<i class="fa-solid fa-house"></i> Dashboard
</a>

<a href="students.html" class="sidebar-link">
<i class="fa-solid fa-users"></i> Manage Students
</a>

<a href="marks.html" class="sidebar-link active">
<i class="fa-solid fa-pen"></i> Record Marks
</a>

<a href="results.html" class="sidebar-link">
<i class="fa-solid fa-chart-column"></i> Results
</a>

<a href="login.html" class="sidebar-link">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</div>
</aside>

<main class="main-content">

<div class="topbar">

<div class="teacher-info">
<h2>Record Marks</h2>
<p>Record tests and exams</p>
</div>

<div class="marks-actions">

<button class="btn btn-primary" onclick="openTestModal()">
<i class="fa-solid fa-plus"></i> Add Test
</button>

<button class="btn btn-success">Save Marks</button>

</div>

</div>

<!-- FILTERS -->
<div id="subjectContainer" class="subject-selector"></div>
<div id="classContainer" class="class-selector"></div>
<div id="termContainer" class="class-selector"></div>

<!-- TABLE -->
<div class="card">
<div class="table-container">

<table class="marks-table">

<thead>
<tr>
<th>#</th>
<th>Student Name</th>
<th>Test 1</th>
<th>Test 2</th>
<th>Total Test</th>
<th>Test Overall (90)</th>
<th>Exam</th>
<th>Total</th>
</tr>
</thead>

<tbody id="marksTable"></tbody>

</table>

</div>
</div>

</main>
</div>

<!-- MODAL -->
<div class="modal" id="testModal">
<div class="modal-content">

<h2>Add New Test</h2>

<div class="input-group">
<label>Test Name</label>
<input type="text">
</div>

<div class="input-group">
<label>Out Of</label>
<input type="number">
</div>

<div style="display:flex;gap:10px;margin-top:20px;">
<button class="btn btn-danger" onclick="closeTestModal()">Cancel</button>
<button class="btn btn-primary">Add Test</button>
</div>

</div>
</div>

<script>

const teacher = JSON.parse(localStorage.getItem("teacher") || "{}");

let selectedSubject = null;
let selectedClass = null;
let selectedTerm = null;
let selectedYear = null;

async function school(action, body = {}, method = "GET") {

    let url = `/.netlify/functions/school?action=${action}`;

    const options = {
        method,
        headers: { "Content-Type": "application/json" }
    };

    if (method === "GET") {
        const params = new URLSearchParams(body).toString();
        if (params) url += `&${params}`;
    } else {
        options.body = JSON.stringify(body);
    }

    const res = await fetch(url, options);
    return await res.json();
}

/* LOAD SUBJECTS */
async function loadSubjects() {
    const data = await school("getSubjects");

    const container = document.getElementById("subjectContainer");
    container.innerHTML = "";

    data.forEach((s, i) => {
        container.innerHTML += `
        <button class="subject-btn ${i===0?'active':''}"
        onclick="selectSubject(${s.id}, event)">
        ${s.subject_name}
        </button>`;
    });

    selectedSubject = data[0].id;
    loadClasses();
}

function selectSubject(id, e) {
    selectedSubject = id;
    document.querySelectorAll(".subject-btn").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    loadMarks();
}

/* LOAD CLASSES */
async function loadClasses() {
    const data = await school("getClasses");

    const container = document.getElementById("classContainer");
    container.innerHTML = "";

    data.forEach((c, i) => {
        container.innerHTML += `
        <button class="class-btn ${i===0?'active':''}"
        onclick="selectClass(${c.id}, event)">
        ${c.class_name}
        </button>`;
    });

    selectedClass = data[0].id;
    loadMarks();
}

function selectClass(id, e) {
    selectedClass = id;
    document.querySelectorAll(".class-btn").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    loadMarks();
}

/* TERMS */
async function loadTerms() {
    const res = await fetch("/.netlify/functions/academic?action=getTerms");
    const data = await res.json();

    const container = document.getElementById("termContainer");
    container.innerHTML = "";

    data.forEach((t,i)=>{
        container.innerHTML += `
        <button class="class-btn ${i===0?'active':''}"
        onclick="selectTerm(${t.id}, event)">
        ${t.term_name}
        </button>`;
    });

    selectedTerm = data[0].id;
}

function selectTerm(id,e){
    selectedTerm = id;
    document.querySelectorAll("#termContainer button").forEach(b=>b.classList.remove("active"));
    e.target.classList.add("active");
    loadMarks();
}

/* LOAD ACADEMIC YEAR */
async function loadAcademicContext(){
    const res = await fetch("/.netlify/functions/academic?action=getCurrent");
    const data = await res.json();
    selectedYear = data.year.id;
    selectedTerm = data.term.id;
}

/* LOAD MARKS */
async function loadMarks(){

    if(!selectedClass || !selectedSubject || !selectedTerm || !selectedYear) return;

    const data = await school("getMarks",{
        class_id:selectedClass,
        subject_id:selectedSubject,
        term_id:selectedTerm,
        academic_year_id:selectedYear
    },"GET");

    const table = document.getElementById("marksTable");
    table.innerHTML = "";

    if(!data.length){
        table.innerHTML = `<tr><td colspan="8">No learners found</td></tr>`;
        return;
    }

    data.forEach((learner,i)=>{

        let testScores = learner.marks.map(m=>Number(m.score||0));
        let totalTest = testScores.reduce((a,b)=>a+b,0);
        let testOverall = Math.min((totalTest / 100) * 90, 90);

        let exam = learner.marks.find(m=>m.assessment_type==="Exam")?.score || 0;

        let total = totalTest + Number(exam);

        table.innerHTML += `
        <tr>
        <td>${i+1}</td>
        <td>${learner.full_name}</td>

        ${learner.marks.filter(m=>m.assessment_type!=="Exam").map(m=>`
            <td>
            <input type="number" value="${m.score||''}"
            onchange="saveMark(${learner.id},${selectedSubject},${selectedClass},'${m.assessment_type}',this.value)">
            </td>
        `).join("")}

        <td>${totalTest}</td>
        <td>${testOverall.toFixed(1)}</td>

        <td>
        <input type="number" value="${exam}"
        onchange="saveMark(${learner.id},${selectedSubject},${selectedClass},'Exam',this.value)">
        </td>

        <td>${total}</td>
        </tr>`;
    });
}

/* SAVE MARK */
async function saveMark(learner_id,subject_id,class_id,assessment_type,score){

    await school("saveMark",{
        learner_id,
        subject_id,
        class_id,
        academic_year_id:selectedYear,
        term_id:selectedTerm,
        teacher_id:teacher?.id,
        assessment_type,
        score,
        max_score:100
    },"POST");
}

/* INIT */
loadAcademicContext().then(()=>{
    loadSubjects();
    loadTerms();
});

</script>

</body>
    </html>
